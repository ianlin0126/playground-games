<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Maze Runner 3D!</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #080820;
  font-family: 'Chalkboard SE', 'Comic Sans MS', 'Marker Felt', cursive;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
  display: flex;
  flex-direction: column;
}
#hud {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  padding-top: max(10px, env(safe-area-inset-top, 10px));
  background: rgba(0,0,0,0.75);
  z-index: 10;
  font-size: 24px;
  color: #fff;
  gap: 8px;
}
#hud span { white-space: nowrap; }
#game-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}
#c {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: block;
}
#minimap {
  position: absolute;
  bottom: 8px; right: 8px;
  border: 2px solid rgba(255,255,255,0.35);
  border-radius: 6px;
  opacity: 0.85;
}
#near-exit {
  position: absolute;
  bottom: 130px; left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: 900;
  color: #3FFFA0;
  text-shadow: 0 0 16px rgba(63,255,160,.9);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
  white-space: nowrap;
}
#near-exit.show { opacity: 1; }
#controls {
  flex-shrink: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
  gap: 8px;
}
#dpad {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  grid-template-rows: repeat(2, 70px);
  gap: 5px;
}
.dpad-btn {
  font-family: inherit;
  font-size: 26px;
  background: rgba(255,255,255,0.14);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.28);
  border-radius: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}
.dpad-btn.pressed { background: rgba(255,255,255,0.32); }
.dpad-empty { background: transparent; border: none; pointer-events: none; }
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,40,0.92);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
  padding: 32px;
}
#overlay.show { display: flex; }
#overlay h1 { font-size: 44px; color: #FFE566; text-shadow: 0 0 20px rgba(255,229,102,.8); line-height: 1.2; }
#overlay .big-time { font-size: 58px; color: #3FFFA0; font-weight: 900; text-shadow: 0 0 16px rgba(63,255,160,.7); }
#overlay p  { font-size: 24px; color: #ccc; }
#overlay button {
  font-family: inherit;
  font-size: 28px;
  background: #FFD700;
  color: #08081a;
  border: none;
  border-radius: 999px;
  padding: 14px 44px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,215,0,.5);
  min-width: 200px;
  min-height: 64px;
}
</style>
</head>
<body>
<div id="hud">
  <span>⏱️ <b id="timer-el">0:00</b></span>
  <span id="hint-el" style="color:#3FFFA0;">🏁 Find the Exit!</span>
  <span id="key-status" style="color:#FFD700;">🗝 Find the key!</span>
</div>
<div id="game-area">
  <canvas id="c"></canvas>
  <canvas id="minimap" width="120" height="120"></canvas>
  <div id="near-exit">🏁 Exit is close!</div>
</div>
<div id="controls">
  <div id="dpad">
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-fwd">↑</button>
    <div class="dpad-empty"></div>
    <button class="dpad-btn" id="btn-left">←</button>
    <button class="dpad-btn" id="btn-back">↓</button>
    <button class="dpad-btn" id="btn-right">→</button>
  </div>
</div>
<div id="overlay">
  <h1>🎉 You escaped!</h1>
  <div class="big-time" id="final-time-el">0:00</div>
  <p>Amazing run! 🌟</p>
  <button id="play-again-btn">New Maze! 🌀</button>
</div>
<script>
(function () {
  'use strict';

  /* ── DOM ── */
  var cvs        = document.getElementById('c');
  var ctx        = cvs.getContext('2d');
  var mmCvs      = document.getElementById('minimap');
  var mmCtx      = mmCvs.getContext('2d');
  var timerEl    = document.getElementById('timer-el');
  var hintEl     = document.getElementById('hint-el');
  var nearEl     = document.getElementById('near-exit');
  var overlay    = document.getElementById('overlay');
  var finalTEl   = document.getElementById('final-time-el');
  var playBtn    = document.getElementById('play-again-btn');
  var keyStatusEl = document.getElementById('key-status');

  /* ── Maze ── */
  var N    = 8;
  var GRID = 2 * N + 1;
  var maze = [];
  var exitGX, exitGY;
  var keyGX, keyGY, keyCollected;

  function generateMaze() {
    var r, c;
    maze = [];
    for (r = 0; r < GRID; r++) {
      maze.push([]);
      for (c = 0; c < GRID; c++) maze[r].push(1);
    }
    var vis = [];
    for (r = 0; r < N; r++) { vis.push([]); for (c = 0; c < N; c++) vis[r].push(false); }

    function carve(cr, cc) {
      vis[cr][cc] = true;
      maze[2*cr+1][2*cc+1] = 0;
      var d = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];
      for (var i = d.length-1; i > 0; i--) {
        var j = Math.floor(Math.random()*(i+1));
        var t = d[i]; d[i] = d[j]; d[j] = t;
      }
      for (var k = 0; k < d.length; k++) {
        var nr = cr+d[k].dr, nc = cc+d[k].dc;
        if (nr>=0&&nr<N&&nc>=0&&nc<N&&!vis[nr][nc]) {
          maze[2*cr+1+d[k].dr][2*cc+1+d[k].dc] = 0;
          carve(nr, nc);
        }
      }
    }
    carve(0, 0);
    exitGX = 2*(N-1)+1;
    exitGY = 2*(N-1)+1;

    /* place key in a random open room cell — not start, not exit, not too close to start */
    var cands = [];
    for (r = 0; r < N; r++) {
      for (c = 0; c < N; c++) {
        if (r===0 && c===0) continue;
        if (r===N-1 && c===N-1) continue;
        if (r+c < 3) continue;
        cands.push({ gx: 2*c+1, gy: 2*r+1 });
      }
    }
    var ki = Math.floor(Math.random() * cands.length);
    keyGX = cands[ki].gx;
    keyGY = cands[ki].gy;
    keyCollected = false;
  }

  function cellAt(r, c) {
    if (r<0||r>=GRID||c<0||c>=GRID) return 1;
    return maze[r][c];
  }

  /* ── Player ── */
  var px, py, pAngle;
  var MOVE_SPD = 0.055;
  var TURN_SPD = 0.048;
  var FOV      = Math.PI / 3;

  /* ── Input ── */
  var keys = { fwd:false, back:false, left:false, right:false };

  /* ── Timer / frame counter ── */
  var startMs = 0, won = false, gameTime = 0;
  var zBuffer = [];

  function fmt(ms) {
    var s = Math.floor(ms/1000), m = Math.floor(s/60); s = s%60;
    return m+':'+(s<10?'0':'')+s;
  }

  /* ── Wall colors ── */
  var PALETTE = [
    [255,107,107],[255,209,61],[107,203,119],
    [77,150,255],[207,110,247],[255,159,67]
  ];

  function exitPulse() {
    /* ~0.5 Hz pulse so exit walls visibly throb */
    return 0.65 + Math.abs(Math.sin(gameTime * 0.04)) * 0.35;
  }

  function wallRgb(gx, gy) {
    if (Math.abs(gx-exitGX)<=1 && Math.abs(gy-exitGY)<=1) {
      var p = exitPulse();
      return [Math.round(50*p), Math.round(255*p), Math.round(160*p)];
    }
    var idx = ((gx*3+gy*7)%PALETTE.length+PALETTE.length)%PALETTE.length;
    return PALETTE[idx];
  }

  /* ── Sprite billboards (key + exit marker) ── */
  function renderSprites() {
    var W = cvs.width, H = cvs.height;
    var sprites = [];
    if (!keyCollected) {
      sprites.push({ wx: keyGX+0.5, wy: keyGY+0.5, clr: '#FFD700', lbl: 'KEY' });
    }
    sprites.push({ wx: exitGX+0.5, wy: exitGY+0.5, clr: '#3FFFA0', lbl: 'EXIT' });

    /* draw farthest first */
    sprites.sort(function(a,b){
      var da=(a.wx-px)*(a.wx-px)+(a.wy-py)*(a.wy-py);
      var db=(b.wx-px)*(b.wx-px)+(b.wy-py)*(b.wy-py);
      return db-da;
    });

    for (var s=0; s<sprites.length; s++) {
      var sp=sprites[s];
      var relX=sp.wx-px, relY=sp.wy-py;
      var dist=Math.sqrt(relX*relX+relY*relY);
      if (dist<0.2) continue;

      var spAng=Math.atan2(relY,relX)-pAngle;
      while (spAng> Math.PI) spAng-=2*Math.PI;
      while (spAng<-Math.PI) spAng+=2*Math.PI;
      if (Math.abs(spAng)>FOV*0.58) continue;

      var screenX=Math.round((0.5+spAng/FOV)*W);
      var sprH=Math.min(H,Math.floor(H/dist));
      var sprW=Math.max(4,Math.round(sprH*0.28));
      var x0=screenX-(sprW>>1), x1=x0+sprW;
      var y0=Math.max(0,Math.floor((H-sprH)/2));
      var y1=Math.min(H,Math.floor((H+sprH)/2));

      ctx.globalAlpha=0.92;
      ctx.fillStyle=sp.clr;
      for (var x=x0; x<x1; x++) {
        if (x<0||x>=W) continue;
        if (dist>=(zBuffer[x]||1e9)) continue;
        ctx.fillRect(x,y0,1,y1-y0);
      }
      ctx.globalAlpha=1;

      if (dist<9) {
        var fsize=Math.max(12,Math.min(28,Math.round(18/Math.sqrt(dist))));
        ctx.font='bold '+fsize+'px sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='bottom';
        ctx.fillStyle='#fff';
        ctx.globalAlpha=Math.min(1,2.5/dist);
        ctx.fillText(sp.lbl,screenX,y0);
        ctx.globalAlpha=1;
      }
    }
    ctx.textBaseline='alphabetic';
    ctx.textAlign='left';
  }

  /* ── Render 3D ── */
  function render3d() {
    var W = cvs.width, H = cvs.height;
    zBuffer = [];

    /* ceiling */
    var cg=ctx.createLinearGradient(0,0,0,H/2);
    cg.addColorStop(0,'#06061c'); cg.addColorStop(1,'#10104a');
    ctx.fillStyle=cg; ctx.fillRect(0,0,W,H/2);

    /* floor */
    var fg=ctx.createLinearGradient(0,H/2,0,H);
    fg.addColorStop(0,'#183018'); fg.addColorStop(1,'#0a180a');
    ctx.fillStyle=fg; ctx.fillRect(0,H/2,W,H/2);

    for (var x=0; x<W; x++) {
      var ray=pAngle-FOV/2+(x/(W-1))*FOV;
      var rdx=Math.cos(ray), rdy=Math.sin(ray);
      var mx=Math.floor(px), my=Math.floor(py);
      var ddx=Math.abs(rdx)<1e-9?1e15:Math.abs(1/rdx);
      var ddy=Math.abs(rdy)<1e-9?1e15:Math.abs(1/rdy);
      var stepX,stepY,sdx,sdy;
      if (rdx<0){stepX=-1;sdx=(px-mx)*ddx;}else{stepX=1;sdx=(mx+1-px)*ddx;}
      if (rdy<0){stepY=-1;sdy=(py-my)*ddy;}else{stepY=1;sdy=(my+1-py)*ddy;}
      var side=0,hit=false,lim=64;
      while (!hit&&lim-->0) {
        if (sdx<sdy){sdx+=ddx;mx+=stepX;side=0;}
        else        {sdy+=ddy;my+=stepY;side=1;}
        if (cellAt(my,mx)===1) hit=true;
      }
      if (!hit) { zBuffer[x]=1e9; continue; }
      var perp=(side===0)?(sdx-ddx):(sdy-ddy);
      if (perp<0.01) perp=0.01;
      zBuffer[x]=perp;
      var lh=Math.min(H*4,Math.floor(H/perp));
      var y0=Math.max(0,Math.floor((H-lh)/2));
      var y1=Math.min(H,Math.floor((H+lh)/2));
      var rgb=wallRgb(mx,my);
      var shade=Math.max(0.08,Math.min(1,1-perp*0.065));
      if (side===1) shade*=0.62;
      ctx.fillStyle='rgb('+Math.round(rgb[0]*shade)+','+Math.round(rgb[1]*shade)+','+Math.round(rgb[2]*shade)+')';
      ctx.fillRect(x,y0,1,y1-y0);
    }

    renderSprites();
  }

  /* ── Minimap ── */
  function renderMinimap() {
    var mm=mmCvs.width, cs=mm/GRID;
    mmCtx.fillStyle='rgba(0,0,0,0.72)';
    mmCtx.fillRect(0,0,mm,mm);
    for (var r=0; r<GRID; r++) {
      for (var c=0; c<GRID; c++) {
        if (maze[r][c]===1)             mmCtx.fillStyle='#484860';
        else if (r===exitGY&&c===exitGX) mmCtx.fillStyle='#3FFFA0';
        else                             mmCtx.fillStyle='#0d0d24';
        mmCtx.fillRect(c*cs,r*cs,cs,cs);
      }
    }
    /* key dot */
    if (!keyCollected) {
      mmCtx.fillStyle='#FFD700';
      mmCtx.beginPath();
      mmCtx.arc((keyGX+0.5)*cs,(keyGY+0.5)*cs,cs*1.3,0,Math.PI*2);
      mmCtx.fill();
    }
    /* player */
    var ppx=px*cs, ppy=py*cs;
    mmCtx.fillStyle='#fff';
    mmCtx.beginPath(); mmCtx.arc(ppx,ppy,cs*1.5,0,Math.PI*2); mmCtx.fill();
    mmCtx.strokeStyle='#fff'; mmCtx.lineWidth=1;
    mmCtx.beginPath(); mmCtx.moveTo(ppx,ppy);
    mmCtx.lineTo(ppx+Math.cos(pAngle)*cs*3.5,ppy+Math.sin(pAngle)*cs*3.5);
    mmCtx.stroke();
  }

  /* ── Update ── */
  function update() {
    if (won) return;
    gameTime++;
    if (keys.left)  pAngle-=TURN_SPD;
    if (keys.right) pAngle+=TURN_SPD;

    var M=0.22;
    var dx=0, dy=0;
    if (keys.fwd)  { dx=Math.cos(pAngle)*MOVE_SPD; dy=Math.sin(pAngle)*MOVE_SPD; }
    if (keys.back) { dx=-Math.cos(pAngle)*MOVE_SPD; dy=-Math.sin(pAngle)*MOVE_SPD; }

    var nx=px+dx;
    if (cellAt(Math.floor(py-M),Math.floor(nx+M))!==1 &&
        cellAt(Math.floor(py+M),Math.floor(nx+M))!==1 &&
        cellAt(Math.floor(py-M),Math.floor(nx-M))!==1 &&
        cellAt(Math.floor(py+M),Math.floor(nx-M))!==1) px=nx;

    var ny=py+dy;
    if (cellAt(Math.floor(ny+M),Math.floor(px-M))!==1 &&
        cellAt(Math.floor(ny+M),Math.floor(px+M))!==1 &&
        cellAt(Math.floor(ny-M),Math.floor(px-M))!==1 &&
        cellAt(Math.floor(ny-M),Math.floor(px+M))!==1) py=ny;

    /* key pickup */
    if (!keyCollected) {
      var kdx=px-(keyGX+0.5), kdy=py-(keyGY+0.5);
      if (kdx*kdx+kdy*kdy<0.55) {
        keyCollected=true;
        keyStatusEl.textContent='🗝 Got it! Find the exit!';
        keyStatusEl.style.color='#3FFFA0';
      }
    }
  }

  /* ── Win check ── */
  function checkWin() {
    if (won) return;
    var dx=px-(exitGX+0.5), dy=py-(exitGY+0.5);
    var d2=dx*dx+dy*dy;
    if (d2<5) {
      nearEl.textContent=keyCollected?'🏁 Exit is close!':'🗝 Get the key first!';
      nearEl.classList.add('show');
    } else {
      nearEl.classList.remove('show');
    }
    if (d2<0.65 && keyCollected) {
      won=true;
      var elapsed=Date.now()-startMs;
      finalTEl.textContent=fmt(elapsed);
      overlay.classList.add('show');
    }
  }

  /* ── Main loop ── */
  function loop() {
    var ga=document.getElementById('game-area');
    if (cvs.width!==ga.clientWidth||cvs.height!==ga.clientHeight) {
      cvs.width=ga.clientWidth; cvs.height=ga.clientHeight;
    }
    if (!won) timerEl.textContent=fmt(Date.now()-startMs);
    update();
    render3d();
    renderMinimap();
    checkWin();
    requestAnimationFrame(loop);
  }

  /* ── Buttons ── */
  var btnFwd  =document.getElementById('btn-fwd');
  var btnBack =document.getElementById('btn-back');
  var btnLeft =document.getElementById('btn-left');
  var btnRight=document.getElementById('btn-right');

  var DOWN_EVS=['pointerdown','touchstart'];
  var UP_EVS  =['pointerup','pointercancel','touchend','touchcancel'];

  function bindBtn(btn,key) {
    DOWN_EVS.forEach(function(ev){ btn.addEventListener(ev,function(e){ e.preventDefault(); keys[key]=true;  btn.classList.add('pressed');    },{passive:false}); });
    UP_EVS.forEach(  function(ev){ btn.addEventListener(ev,function(e){ e.preventDefault(); keys[key]=false; btn.classList.remove('pressed'); },{passive:false}); });
  }
  bindBtn(btnFwd,'fwd'); bindBtn(btnBack,'back');
  bindBtn(btnLeft,'left'); bindBtn(btnRight,'right');

  window.addEventListener('keydown',function(e){
    if (e.key==='ArrowUp'   ||e.key==='w'||e.key==='W') keys.fwd=true;
    if (e.key==='ArrowDown' ||e.key==='s'||e.key==='S') keys.back=true;
    if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keys.left=true;
    if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=true;
  });
  window.addEventListener('keyup',function(e){
    if (e.key==='ArrowUp'   ||e.key==='w'||e.key==='W') keys.fwd=false;
    if (e.key==='ArrowDown' ||e.key==='s'||e.key==='S') keys.back=false;
    if (e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') keys.left=false;
    if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
  });

  playBtn.addEventListener('click',function(){
    overlay.classList.remove('show');
    startGame();
  });

  /* ── Start ── */
  function startGame() {
    generateMaze();
    px=1.5; py=1.5; pAngle=0;
    keys.fwd=keys.back=keys.left=keys.right=false;
    won=false; gameTime=0;
    startMs=Date.now();
    nearEl.classList.remove('show');
    nearEl.textContent='🏁 Exit is close!';
    keyStatusEl.textContent='🗝 Find the key!';
    keyStatusEl.style.color='#FFD700';
  }

  startGame();
  requestAnimationFrame(loop);
}());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ocean World Evolution 🌊</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#001122; overflow:hidden; touch-action:none; user-select:none; font-family:'Arial Rounded MT Bold',Arial,sans-serif; }
#canvas { display:block; }
#hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:flex-start; padding:10px 14px; pointer-events:none; z-index:10; }
.hbox { background:rgba(0,0,0,.65); border-radius:14px; padding:8px 13px; color:#fff; font-size:20px; font-weight:bold; }
#evo-wrap { position:fixed; bottom:14px; left:50%; transform:translateX(-50%); width:min(360px,90vw); z-index:10; pointer-events:none; }
#evo-label { color:#fff; font-size:18px; font-weight:bold; text-align:center; margin-bottom:4px; text-shadow:0 1px 4px #000; }
#evo-bg { background:rgba(0,0,0,.5); border-radius:20px; height:22px; padding:3px; }
#evo-fill { background:linear-gradient(90deg,#00e5ff,#00ff7f); border-radius:20px; height:100%; width:0%; transition:width .3s; }
#boss-wrap { position:fixed; top:68px; left:50%; transform:translateX(-50%); width:min(320px,85vw); z-index:10; pointer-events:none; display:none; }
#boss-label { color:#ff5252; font-size:18px; font-weight:bold; text-align:center; margin-bottom:4px; }
#boss-bg { background:rgba(0,0,0,.5); border-radius:20px; height:22px; padding:3px; }
#boss-fill { background:linear-gradient(90deg,#ff5252,#ff1744); border-radius:20px; height:100%; width:100%; transition:width .25s; }
#announce { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:30; color:#fff; font-size:36px; font-weight:bold; text-shadow:0 3px 14px #000,0 0 40px #00e5ff; pointer-events:none; opacity:0; transition:opacity .4s; text-align:center; line-height:1.3; width:92vw; }
#announce.show { opacity:1; }
#ink-btn { position:fixed; bottom:80px; right:18px; z-index:20; width:82px; height:82px; border-radius:50%; background:#7b1fa2; border:4px solid #ce93d8; color:#fff; font-size:30px; display:none; align-items:center; justify-content:center; cursor:pointer; flex-direction:column; gap:1px; -webkit-tap-highlight-color:transparent; }
#ink-btn.ready { background:#9c27b0; box-shadow:0 0 20px #ce93d8; }
#ink-btn.cooling { background:#3d1257; border-color:#6a1b9a; }
#ink-cd { font-size:14px; color:#e1bee7; }
#sprint-btn { position:fixed; bottom:80px; left:18px; z-index:20; width:82px; height:82px; border-radius:50%; background:#e65100; border:4px solid #ffcc80; color:#fff; font-size:30px; display:none; align-items:center; justify-content:center; cursor:pointer; flex-direction:column; gap:1px; -webkit-tap-highlight-color:transparent; }
#sprint-btn.ready { background:#ff6d00; box-shadow:0 0 20px #ffcc80; }
#sprint-btn.cooling { background:#5d2600; border-color:#bf360c; }
#sprint-cd { font-size:14px; color:#ffe0b2; }
#cloak-btn { position:fixed; bottom:80px; left:18px; z-index:20; width:82px; height:82px; border-radius:50%; background:#006064; border:4px solid #80deea; color:#fff; font-size:30px; display:none; align-items:center; justify-content:center; cursor:pointer; flex-direction:column; gap:1px; -webkit-tap-highlight-color:transparent; }
#cloak-btn.ready { background:#00838f; box-shadow:0 0 20px #80deea; }
#cloak-btn.active { background:#00acc1; border-color:#00e5ff; animation:cloakPulse .8s ease-in-out infinite alternate; }
#cloak-btn.cooling { background:#002a2e; border-color:#004d40; }
#cloak-cd { font-size:14px; color:#e0f7fa; }
@keyframes cloakPulse { from { box-shadow:0 0 20px #00e5ff; } to { box-shadow:0 0 50px #00e5ff,0 0 90px #00b0ff; } }
#continue-screen { position:fixed; inset:0; background:rgba(0,8,26,.97); z-index:70; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:32px; gap:20px; }
#continue-screen h1 { font-size:40px; text-shadow:0 0 24px #ffd700; }
#continue-screen .save-card { background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); border-radius:20px; padding:18px 28px; font-size:22px; line-height:1.8; }
#save-save-btn { width:min(320px,88vw); padding:20px; border:none; border-radius:28px; background:linear-gradient(135deg,#00897b,#00695c); color:#fff; font-size:24px; font-weight:bold; cursor:pointer; min-height:76px; -webkit-tap-highlight-color:transparent; }
#save-new-btn { width:min(320px,88vw); padding:16px; border:none; border-radius:28px; background:rgba(255,255,255,.12); color:#aad4ff; font-size:20px; font-weight:bold; cursor:pointer; min-height:62px; -webkit-tap-highlight-color:transparent; }
.sbtn-save { background:linear-gradient(135deg,#00897b,#004d40); color:#fff; }
#choice-screen { position:fixed; inset:0; background:rgba(0,8,26,.96); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:28px; gap:22px; }
#choice-screen.show { display:flex; }
#choice-screen h1 { font-size:38px; text-shadow:0 0 24px #ffd700; }
#choice-screen p { font-size:22px; color:#aad4ff; line-height:1.5; }
.cbtn { width:min(320px,88vw); padding:24px 20px; border:none; border-radius:30px; font-size:26px; font-weight:bold; cursor:pointer; min-height:84px; display:block; }
#btn-king { background:linear-gradient(135deg,#ffd700,#ff8f00); color:#001122; }
#btn-land { background:linear-gradient(135deg,#43a047,#00695c); color:#fff; }
#btn-continue { background:linear-gradient(135deg,#1565c0,#0d47a1); color:#fff; }
#win-screen { position:fixed; inset:0; background:rgba(0,8,26,.94); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:28px; gap:14px; }
#win-screen.show { display:flex; }
#win-title { font-size:42px; }
#win-msg { font-size:24px; line-height:1.5; }
#win-sub { font-size:19px; color:#aad4ff; }
#replay-btn { background:#00e5ff; color:#001122; font-size:26px; font-weight:bold; padding:16px 44px; border:none; border-radius:50px; cursor:pointer; min-height:64px; margin-top:10px; }
#oneshot-ind { position:fixed; top:68px; left:50%; transform:translateX(-50%); background:rgba(255,215,0,.95); color:#001122; font-size:17px; font-weight:bold; padding:6px 18px; border-radius:20px; display:none; z-index:11; pointer-events:none; white-space:nowrap; }
#shop-screen { position:fixed; inset:0; background:rgba(0,8,26,.97); z-index:60; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; padding:28px; gap:18px; }
#shop-screen.show { display:flex; }
#shop-screen h2 { font-size:36px; text-shadow:0 0 20px #ffd700; }
#shop-bal { font-size:26px; color:#ffd700; }
.sbtn { width:min(320px,88vw); padding:22px 20px; border:none; border-radius:28px; font-size:22px; font-weight:bold; cursor:pointer; min-height:80px; display:flex; flex-direction:column; align-items:center; gap:6px; -webkit-tap-highlight-color:transparent; }
.sbtn:active { transform:scale(0.95); }
#sbtn-oneshot { background:linear-gradient(135deg,#ffd700,#ff8f00); color:#001122; }
#sbtn-robot { background:linear-gradient(135deg,#00acc1,#006064); color:#fff; }
.sbtn-sub { font-size:16px; opacity:0.82; }
#shop-close-btn { padding:14px 40px; border:none; border-radius:24px; background:rgba(255,255,255,.15); color:#fff; font-size:22px; font-weight:bold; cursor:pointer; min-height:56px; -webkit-tap-highlight-color:transparent; }
#shop-close-btn:active { background:rgba(255,255,255,.25); }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="hbox" id="lives-el">❤️❤️❤️</div>
  <div class="hbox" id="stage-el">🐟 Tiny Fish</div>
  <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
    <div class="hbox" id="score-el">⭐ 0</div>
    <div class="hbox" id="coins-hud" style="pointer-events:all;cursor:pointer;font-size:18px" onclick="openShop()">🟡 0 🛒</div>
    <div class="hbox" style="pointer-events:all;cursor:pointer;font-size:16px;background:rgba(0,105,92,.92);border:2px solid #80cbc4;padding:6px 12px" onclick="saveProgress()">💾 Save!</div>
  </div>
</div>
<div id="evo-wrap">
  <div id="evo-label">Eat food to evolve!</div>
  <div id="evo-bg"><div id="evo-fill"></div></div>
</div>
<div id="boss-wrap">
  <div id="boss-label">🤖 OCEAN BOSS</div>
  <div id="boss-bg"><div id="boss-fill"></div></div>
</div>
<button id="ink-btn" onclick="fireInk()">🦑<span id="ink-cd"></span></button>
<button id="sprint-btn" onclick="fireSprint()">⚡<span id="sprint-cd"></span></button>
<button id="cloak-btn" onclick="fireCloak()">🐙<span id="cloak-cd"></span></button>
<div id="announce"></div>
<div id="oneshot-ind">⚡ ONE-SHOT READY!</div>
<div id="continue-screen">
  <h1>💾 Welcome Back!</h1>
  <div class="save-card">
    <div id="save-info-stage">—</div>
    <div id="save-info-score">—</div>
    <div id="save-info-coins">—</div>
  </div>
  <button id="save-save-btn" onclick="resumeGame()">▶ Continue! 🐟</button>
  <button id="save-new-btn" onclick="startFreshGame()">🔄 Start Over</button>
</div>
<div id="shop-screen">
  <h2>🛒 Ocean Shop</h2>
  <div id="shop-bal">🟡 <span id="shop-coins-el">0</span> coins</div>
  <button class="sbtn sbtn-save" id="sbtn-save" onclick="saveProgress()">
    <span>💾 Save Game!</span>
    <span class="sbtn-sub">Save your progress — it's free! ⭐</span>
  </button>
  <button class="sbtn" id="sbtn-oneshot" onclick="buyOneShot()">
    <span>⚡ One-Shot Boss!</span>
    <span class="sbtn-sub">Next boss charge = instant win! · 20 🟡</span>
  </button>
  <button class="sbtn" id="sbtn-robot" onclick="buyFakeRobot()">
    <span>🤖 Fake Robot Decoy</span>
    <span class="sbtn-sub">Enemies chase it, not you! · 10 🟡</span>
  </button>
  <button id="shop-close-btn" onclick="closeShop()">▶ Keep Swimming!</button>
</div>
<div id="choice-screen">
  <h1>🏆 KRAKEN DEFEATED! 🏆</h1>
  <p>You rule the entire ocean!<br>What happens next?</p>
  <button class="cbtn" id="btn-king" onclick="chooseKing()">👑 Become King of the Ocean!</button>
  <button class="cbtn" id="btn-land" onclick="chooseLand()">🌍 Explore Land World!</button>
  <button class="cbtn" id="btn-continue" onclick="chooseContinue()">🎣 Face the Anglerfish!</button>
</div>
<div id="win-screen">
  <div id="win-title">🏆 YOU WIN!!</div>
  <div id="win-msg">Amazing!!</div>
  <div id="win-sub">🌊 Great job!!</div>
  <button id="replay-btn" onclick="initGame()">Play Again! 🎮</button>
</div>

<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

var livesEl  = document.getElementById('lives-el');
var stageEl  = document.getElementById('stage-el');
var scoreEl  = document.getElementById('score-el');
var evoWrap  = document.getElementById('evo-wrap');
var evoFill  = document.getElementById('evo-fill');
var evoLabel = document.getElementById('evo-label');
var bossWrap  = document.getElementById('boss-wrap');
var bossFill  = document.getElementById('boss-fill');
var bossLabel = document.getElementById('boss-label');
var announceEl    = document.getElementById('announce');
var inkBtn        = document.getElementById('ink-btn');
var inkCdEl       = document.getElementById('ink-cd');
var sprintBtn     = document.getElementById('sprint-btn');
var sprintCdEl    = document.getElementById('sprint-cd');
var cloakBtn      = document.getElementById('cloak-btn');
var cloakCdEl     = document.getElementById('cloak-cd');
var choiceScreen  = document.getElementById('choice-screen');
var winScreen     = document.getElementById('win-screen');
var winTitle      = document.getElementById('win-title');
var winMsg        = document.getElementById('win-msg');
var winSub        = document.getElementById('win-sub');

// ── Constants ─────────────────────────────────────────────────────────────
var FISH_STAGES = [
  { name:'🐟 Tiny Fish',  color:'#00e5ff', size:20, needed:12 },
  { name:'🦈 Shark',      color:'#5cc8dc', size:36, needed:20 },
  { name:'🦈 Mega Shark', color:'#ff7043', size:54, needed:30 },
  { name:'🐋 Orca',       color:'#1a1a2e', size:70, needed:40 },
  { name:'🐋 Blue Whale', color:'#1565c0', size:90, needed:25 }
];
var SQUID = { name:'🦑 Squid', color:'#ce93d8', size:58, needed:28 };
var OCTOPUS_COLOR = '#e65100';
var LAND_STAGES = [
  { name:'🐭 Tiny Mouse',  size:20, needed:12 },
  { name:'🐭 Adult Mouse', size:32, needed:18 },
  { name:'🐀 Rat',         size:46, needed:26 },
];
var BOSS1_MAX = 7, BOSS2_MAX = 10, BOSS3_MAX = 12, MAX_LIVES = 20, INK_CD_MAX = 5, SPRINT_CD_MAX = 5;
var CLOAK_DURATION = 10, CLOAK_CD_MAX = 14;
var PREY_COLORS = ['#ffee58','#ffa726','#ab47bc','#26c6da','#66bb6a','#ff7eb3'];

// ── State ─────────────────────────────────────────────────────────────────
var phase, score, lives, si, evoPoints, isSquid, isOctopus, isLand;
var cloakActive, cloakTimer, cloakCooldown;
var px, py, pvx, pvy, pAngle, pTargetX, pTargetY, pMoving, invTimer;
var foods, enemies, roboFish, tornados, boss;
var bossHp, bossHitCool, bossAtkTimer, bossPhase2;
var bubbles = [], respawnQ = [], annTimer = null, frameN = 0, lastTs = 0;
var inkCooldown = 0, inkClouds = [];
var sprintCooldown = 0;
var squidEvo = 0;
var kraken = null, kFishPiles = [], krakenPhase2 = false, krakenFreezeTimer = 0;
var anglerfish = null, lightbulbs = [], shockTimer = 0;
var coins = 0, coinPickups = [], coinSpawnTimer = 8;
var shopOpen = false, oneShotPower = false, fakeRobotDecoy = null;

for (var _i = 0; _i < 30; _i++) {
  bubbles.push({ x:Math.random()*2000, y:Math.random()*1200, r:2+Math.random()*5, spd:0.3+Math.random()*0.8 });
}

function initGame(silent) {
  phase='play'; score=0; lives=20; si=0; evoPoints=0; isSquid=false; isOctopus=false; isLand=false;
  cloakActive=false; cloakTimer=0; cloakCooldown=0;
  px=W/2; py=H/2; pvx=pvy=0; pAngle=0;
  pTargetX=W/2; pTargetY=H/2; pMoving=false; invTimer=0;
  foods=[]; enemies=[]; roboFish=[]; tornados=[]; boss=null; kraken=null; kFishPiles=[]; anglerfish=null; lightbulbs=[];
  bossHp=BOSS1_MAX; bossHitCool=0; bossAtkTimer=3; bossPhase2=false;
  inkCooldown=0; inkClouds=[]; sprintCooldown=0; squidEvo=0; krakenPhase2=false; krakenFreezeTimer=0; shockTimer=0; respawnQ=[];
  coins=0; coinPickups=[]; coinSpawnTimer=8; shopOpen=false; oneShotPower=false; fakeRobotDecoy=null;
  for(var _ci=0;_ci<5;_ci++) coinPickups.push(makeCoinPickup());
  document.getElementById('oneshot-ind').style.display='none';
  choiceScreen.classList.remove('show');
  winScreen.classList.remove('show');
  bossWrap.style.display='none'; evoWrap.style.display='block'; inkBtn.style.display='none'; sprintBtn.style.display='none'; cloakBtn.style.display='none';
  spawnFoods(16); spawnEnemies(3); updateHUD();
  if (!silent) showAnnounce('🐟 Eat smaller fish!\nAvoid bigger ones! 🦈');
}

// ── Controls ─────────────────────────────────────────────────────────────
function onPtr(ex, ey) { pTargetX=ex; pTargetY=ey; pMoving=true; }
canvas.addEventListener('pointermove', function(e){ onPtr(e.clientX,e.clientY); });
canvas.addEventListener('pointerdown', function(e){ onPtr(e.clientX,e.clientY); });
canvas.addEventListener('pointerup', function(){ pMoving=false; });

// ── HUD ───────────────────────────────────────────────────────────────────
function updateHUD() {
  var h=''; for(var i=0;i<Math.max(0,lives);i++) h+='❤️';
  livesEl.textContent = h||'💔';
  stageEl.textContent = isOctopus ? '🐙 Octopus' : isLand ? LAND_STAGES[si].name : (isSquid ? SQUID.name : FISH_STAGES[si].name);
  scoreEl.textContent = '⭐ '+score;
  if (phase==='play') {
    evoFill.style.width=Math.min(100,(evoPoints/FISH_STAGES[si].needed)*100)+'%';
    evoLabel.textContent='Evolve! '+evoPoints+' / '+FISH_STAGES[si].needed;
    evoWrap.style.display='block'; bossWrap.style.display='none';
  } else if (phase==='squid') {
    evoFill.style.width=Math.min(100,(squidEvo/SQUID.needed)*100)+'%';
    evoLabel.textContent='🦑 Power up! '+squidEvo+' / '+SQUID.needed;
    evoWrap.style.display='block'; bossWrap.style.display='none';
  } else if (phase==='boss1') {
    bossLabel.textContent='🤖 OCEAN BOSS';
    evoWrap.style.display='none'; bossWrap.style.display='block';
    bossFill.style.width=Math.max(0,(bossHp/BOSS1_MAX)*100)+'%';
  } else if (phase==='boss2') {
    bossLabel.textContent='🐙 KRAKEN';
    evoWrap.style.display='none'; bossWrap.style.display='block';
    bossFill.style.width=Math.max(0,(kraken?kraken.hp/BOSS2_MAX:0)*100)+'%';
  } else if (phase==='boss3') {
    bossLabel.textContent='🎣 ANGLERFISH';
    evoWrap.style.display='none'; bossWrap.style.display='block';
    bossFill.style.width=Math.max(0,(anglerfish?anglerfish.hp/BOSS3_MAX:0)*100)+'%';
  } else if (phase==='land') {
    var ls=LAND_STAGES[si];
    evoFill.style.width=Math.min(100,(evoPoints/ls.needed)*100)+'%';
    evoLabel.textContent='Evolve! '+evoPoints+' / '+ls.needed;
    evoWrap.style.display='block'; bossWrap.style.display='none';
  }
  if (isSquid && (phase==='squid'||phase==='boss2')) {
    inkBtn.style.display='flex';
    if (inkCooldown<=0) { inkBtn.className='ready'; inkCdEl.textContent=''; }
    else { inkBtn.className='cooling'; inkCdEl.textContent=Math.ceil(inkCooldown)+'s'; }
  } else {
    inkBtn.style.display='none';
  }
  if (phase==='play'||phase==='squid'||phase==='boss1'||phase==='boss2'||phase==='land') {
    sprintBtn.style.display='flex';
    if (sprintCooldown<=0) { sprintBtn.className='ready'; sprintCdEl.textContent=''; }
    else { sprintBtn.className='cooling'; sprintCdEl.textContent=Math.ceil(sprintCooldown)+'s'; }
  } else {
    sprintBtn.style.display='none';
  }
  if (phase==='boss3'&&isOctopus) {
    cloakBtn.style.display='flex';
    if (cloakActive) { cloakBtn.className='active'; cloakCdEl.textContent=Math.ceil(cloakTimer)+'s'; }
    else if (cloakCooldown>0) { cloakBtn.className='cooling'; cloakCdEl.textContent=Math.ceil(cloakCooldown)+'s'; }
    else { cloakBtn.className='ready'; cloakCdEl.textContent=''; }
  } else { cloakBtn.style.display='none'; }
  document.getElementById('coins-hud').textContent='🟡 '+coins+' 🛒';
  var osi=document.getElementById('oneshot-ind');
  osi.style.display=oneShotPower?'block':'none';
}

function showAnnounce(txt, dur) {
  announceEl.textContent=txt; announceEl.classList.add('show');
  if(annTimer) clearTimeout(annTimer);
  annTimer=setTimeout(function(){ announceEl.classList.remove('show'); }, dur||2600);
}

// ── Sprint ────────────────────────────────────────────────────────────────
function fireSprint() {
  if (sprintCooldown>0) return;
  sprintCooldown=SPRINT_CD_MAX;
  pvx+=Math.cos(pAngle)*20; pvy+=Math.sin(pAngle)*20;
}

// ── Ink ───────────────────────────────────────────────────────────────────
function fireInk() {
  if (inkCooldown>0) return;
  inkCooldown=INK_CD_MAX;
  inkClouds.push({ x:px, y:py, r:14, maxR:115, life:3.5, alive:true });
}

function fireCloak() {
  if (cloakCooldown>0||cloakActive) return;
  cloakActive=true; cloakTimer=CLOAK_DURATION; cloakCooldown=CLOAK_CD_MAX;
  showAnnounce('🐙 CAMOUFLAGE!\nAnglerfish can\'t see you! 👻',2800);
}

function updInk(dt) {
  if (inkCooldown>0) inkCooldown-=dt;
  if (sprintCooldown>0) sprintCooldown-=dt;
  for (var ci=0;ci<inkClouds.length;ci++) {
    var ic=inkClouds[ci]; if(!ic.alive) continue;
    ic.life-=dt;
    if(ic.life<=0){ic.alive=false;continue;}
    if(ic.r<ic.maxR) ic.r+=160*dt;
    var stunTargets=enemies.concat(roboFish,kFishPiles);
    for(var si2=0;si2<stunTargets.length;si2++){
      var e=stunTargets[si2]; if(!e.alive) continue;
      var dx=e.x-ic.x,dy=e.y-ic.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<ic.r){ e.stunned=2.5; e.vx*=0.08; e.vy*=0.08; }
    }
  }
}

// ── Food ──────────────────────────────────────────────────────────────────
function fSz(t){return{plankton:7,sf:13,mf:22,lf:34,xlf:46}[t]||8;}
function fPt(t){return{plankton:1,sf:2,mf:4,lf:7,xlf:12}[t]||1;}
function canEat(t) {
  var ps=isSquid?SQUID.size:FISH_STAGES[si].size;
  if(t==='plankton') return true;
  if(t==='sf') return ps>=26;
  if(t==='mf') return ps>=44;
  if(t==='lf') return ps>=60;
  if(t==='xlf') return ps>=80;
  return false;
}
function spawnFoods(n){for(var i=0;i<n;i++) foods.push(makeFood());}
function makeFood() {
  var pool;
  if(si===0) pool=['plankton','plankton','plankton','sf'];
  else if(si===1) pool=['plankton','sf','sf','mf'];
  else if(si===2) pool=['sf','mf','mf','lf'];
  else pool=['mf','lf','lf','xlf'];
  var t=pool[Math.floor(Math.random()*pool.length)];
  var e=Math.floor(Math.random()*4);
  var x=e===0||e===2?Math.random()*W:(e===1?W+50:-50);
  var y=e===1||e===3?Math.random()*H:(e===0?-50:H+50);
  return{type:t,x:x,y:y,vx:(Math.random()-.5)*1.4,vy:(Math.random()-.5)*1.0,size:fSz(t),wobble:Math.random()*6.28,alive:true};
}

// ── Enemies ───────────────────────────────────────────────────────────────
function spawnEnemies(n){for(var i=0;i<n;i++) enemies.push(makeEnemy());}
function makeEnemy() {
  var ps=isSquid?SQUID.size:FISH_STAGES[si].size;
  var isPred=Math.random()<0.5;
  var size=isPred?Math.min(110,ps*(1.3+Math.random()*.4)):Math.max(8,ps*(.35+Math.random()*.25));
  var e=Math.floor(Math.random()*4);
  var x=e===0||e===2?Math.random()*W:(e===1?W+70:-70);
  var y=e===1||e===3?Math.random()*H:(e===0?-70:H+70);
  var col=isPred?null:PREY_COLORS[Math.floor(Math.random()*PREY_COLORS.length)];
  return{x:x,y:y,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,size:size,isPred:isPred,color:col,wobble:Math.random()*6.28,alive:true,stunned:0};
}

function hurtPlayer(fromX, fromY) {
  if(invTimer>0) return;
  lives--; invTimer=2.5;
  var dir=Math.atan2(py-fromY,px-fromX);
  pvx=Math.cos(dir)*10; pvy=Math.sin(dir)*10;
  updateHUD();
  if(lives<=0){
    if(isLand){
      var _lsave=loadSaveData();
      if(_lsave&&_lsave.checkpoint==='land'){
        showAnnounce('💪 Back to your checkpoint! 🐭⭐',3500);
        setTimeout(function(){
          initGame(true);
          score=_lsave.score||0; lives=Math.max(3,_lsave.lives||3); coins=_lsave.coins||0;
          isLand=true;
          phase='land'; si=Math.min(_lsave.si||0,LAND_STAGES.length-1); evoPoints=0;
          px=W/2; py=H/2; pvx=pvy=0; pAngle=0;
          foods=[]; enemies=[]; respawnQ=[];
          spawnLandFoods(14); spawnLandEnemies(3+si); updateHUD();
        },4000);
      } else {
        showAnnounce('💪 Back to Ocean World! 🌊',3500);
        setTimeout(initGame,4000);
      }
    } else {
      showAnnounce('💪 So close! Try again! 💪',9999); setTimeout(initGame,3000);
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────
function update(dt) {
  frameN++;
  coinSpawnTimer-=dt;
  if(coinSpawnTimer<=0){ coinPickups.push(makeCoinPickup()); coinSpawnTimer=8+Math.random()*6; }
  updCoins(dt);
  if(fakeRobotDecoy) updFakeRobotDecoy(dt);
  if(pMoving){
    var dx=pTargetX-px,dy=pTargetY-py,d=Math.sqrt(dx*dx+dy*dy);
    if(d>2){pvx+=(dx/d)*4*dt*60*0.13;pvy+=(dy/d)*4*dt*60*0.13;}
    if(d>4) pAngle=Math.atan2(dy,dx);
  }
  pvx*=0.84; pvy*=0.84;
  var ps=isLand?LAND_STAGES[si].size:(isSquid?SQUID.size:FISH_STAGES[si].size);
  px=Math.max(ps,Math.min(W-ps,px+pvx));
  py=Math.max(ps,Math.min(H-ps,py+pvy));
  if(invTimer>0) invTimer-=dt;
  if(shockTimer>0) shockTimer-=dt;
  if(cloakActive){ cloakTimer-=dt; if(cloakTimer<=0){ cloakActive=false; showAnnounce('👀 Visible again!\nKeep charging! 🐙',1800); } }
  if(cloakCooldown>0) cloakCooldown-=dt;
  updInk(dt);
  if(phase==='play'){ updFoods(dt); updEnemies(dt); }
  else if(phase==='squid'){ updFoodsSquid(dt); updEnemiesSquid(dt); }
  else if(phase==='boss1'){ updBoss1(dt); updRobo(dt); updTornadoes(dt); }
  else if(phase==='boss2'){ updKraken(dt); updKFishPiles(dt); updRobo(dt); }
  else if(phase==='boss3'){ updAnglerfish(dt); updLightbulbs(dt); }
  else if(phase==='land'){ updLandFoods(dt); updLandEnemies(dt); }
  var nq=[];
  for(var qi=0;qi<respawnQ.length;qi++){
    if(Date.now()>=respawnQ[qi]) foods.push(isLand?makeLandFood():makeFood()); else nq.push(respawnQ[qi]);
  }
  respawnQ=nq;
  updateHUD();
}

function updFoods(dt) {
  var ps=FISH_STAGES[si].size;
  for(var fi=0;fi<foods.length;fi++){
    var f=foods[fi]; if(!f.alive) continue;
    f.wobble+=dt*2; f.x+=f.vx; f.y+=f.vy;
    if(f.x<-60)f.x=W+50; if(f.x>W+60)f.x=-50;
    if(f.y<-60)f.y=H+50; if(f.y>H+60)f.y=-50;
    var fdx=f.x-px,fdy=f.y-py,fd=Math.sqrt(fdx*fdx+fdy*fdy);
    if(canEat(f.type)&&fd<ps*.9+f.size*.6){
      f.alive=false; score+=fPt(f.type); evoPoints+=fPt(f.type);
      respawnQ.push(Date.now()+1400);
      if(evoPoints>=FISH_STAGES[si].needed) evolve();
    }
  }
}

function updFoodsSquid(dt) {
  for(var fi=0;fi<foods.length;fi++){
    var f=foods[fi]; if(!f.alive) continue;
    f.wobble+=dt*2; f.x+=f.vx; f.y+=f.vy;
    if(f.x<-60)f.x=W+50; if(f.x>W+60)f.x=-50;
    if(f.y<-60)f.y=H+50; if(f.y>H+60)f.y=-50;
    var fdx=f.x-px,fdy=f.y-py,fd=Math.sqrt(fdx*fdx+fdy*fdy);
    if(fd<SQUID.size*.9+f.size*.6){
      f.alive=false; score+=fPt(f.type); squidEvo+=fPt(f.type);
      respawnQ.push(Date.now()+1400);
      if(squidEvo>=SQUID.needed) startKraken();
    }
  }
}

function updEnemies(dt) {
  var ps=FISH_STAGES[si].size;
  for(var ei=0;ei<enemies.length;ei++){
    var e=enemies[ei]; if(!e.alive) continue;
    if(e.stunned>0){e.stunned-=dt;continue;}
    e.wobble+=dt*2.5;
    var etx=(fakeRobotDecoy&&fakeRobotDecoy.alive)?fakeRobotDecoy.x:px;
    var ety=(fakeRobotDecoy&&fakeRobotDecoy.alive)?fakeRobotDecoy.y:py;
    var edx=etx-e.x,edy=ety-e.y,ed=Math.sqrt(edx*edx+edy*edy);
    var pdx=px-e.x,pdy=py-e.y,pd=Math.sqrt(pdx*pdx+pdy*pdy);
    if(e.isPred){
      var cs=2.2*dt*60*0.04;
      if(ed>5){e.vx+=(edx/ed)*cs;e.vy+=(edy/ed)*cs;}
      e.vx*=0.9;e.vy*=0.9;e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80)e.x=W+60; if(e.x>W+80)e.x=-60;
      if(e.y<-80)e.y=H+60; if(e.y>H+80)e.y=-60;
      if(fakeRobotDecoy&&fakeRobotDecoy.alive&&ed<fakeRobotDecoy.size+e.size*.55){/* absorbed */}
      else if(pd<ps*.75+e.size*.55) hurtPlayer(e.x,e.y);
    } else {
      e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80)e.x=W+60; if(e.x>W+80)e.x=-60;
      if(e.y<-80)e.y=H+60; if(e.y>H+80)e.y=-60;
      if(ed<ps*.85+e.size*.6){
        e.alive=false; score+=5; evoPoints+=3;
        respawnQ.push(Date.now()+1200);
        if(evoPoints>=FISH_STAGES[si].needed) evolve();
      }
    }
  }
}

function updEnemiesSquid(dt) {
  for(var ei=0;ei<enemies.length;ei++){
    var e=enemies[ei]; if(!e.alive) continue;
    if(e.stunned>0){e.stunned-=dt;continue;}
    e.wobble+=dt*2.5;
    var etx2=(fakeRobotDecoy&&fakeRobotDecoy.alive)?fakeRobotDecoy.x:px;
    var ety2=(fakeRobotDecoy&&fakeRobotDecoy.alive)?fakeRobotDecoy.y:py;
    var edx=etx2-e.x,edy=ety2-e.y,ed=Math.sqrt(edx*edx+edy*edy);
    var pdx2=px-e.x,pdy2=py-e.y,pd2=Math.sqrt(pdx2*pdx2+pdy2*pdy2);
    if(e.isPred){
      var cs2=1.8*dt*60*0.04;
      if(ed>5){e.vx+=(edx/ed)*cs2;e.vy+=(edy/ed)*cs2;}
      e.vx*=0.9;e.vy*=0.9;e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80)e.x=W+60; if(e.x>W+80)e.x=-60;
      if(e.y<-80)e.y=H+60; if(e.y>H+80)e.y=-60;
      if(fakeRobotDecoy&&fakeRobotDecoy.alive&&ed<fakeRobotDecoy.size+e.size*.55){/* absorbed */}
      else if(pd2<SQUID.size*.75+e.size*.55) hurtPlayer(e.x,e.y);
    } else {
      e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80)e.x=W+60; if(e.x>W+80)e.x=-60;
      if(e.y<-80)e.y=H+60; if(e.y>H+80)e.y=-60;
      if(ed<SQUID.size*.85+e.size*.6){
        e.alive=false; score+=5; squidEvo+=3;
        respawnQ.push(Date.now()+1200);
        if(squidEvo>=SQUID.needed) startKraken();
      }
    }
  }
}

function evolve() {
  si++; evoPoints=0;
  if(si>=FISH_STAGES.length){
    si=FISH_STAGES.length-1; enemies=[];
    showAnnounce('🐋 BLUE WHALE!! Boss incoming!! 🤖',3000);
    evoWrap.style.display='none';
    setTimeout(startBoss1,3500);
  } else {
    if(lives<MAX_LIVES) lives++;
    showAnnounce('⭐ EVOLVED to '+FISH_STAGES[si].name+'! +1❤️',2500);
    enemies=[]; spawnEnemies(3+si);
    try { var _sd={checkpoint:'fish',si:si,isSquid:false,isOctopus:false,score:score,lives:lives,coins:coins,savedAt:Date.now()}; localStorage.setItem(SAVE_KEY,JSON.stringify(_sd)); } catch(e) {}
  }
  updateHUD();
}

// ── Boss 1: Ocean Boss ────────────────────────────────────────────────────
function startBoss1() {
  phase='boss1'; bossHp=BOSS1_MAX; bossHitCool=0; bossAtkTimer=3; bossPhase2=false;
  boss={x:W*.78,y:H/2,vx:-1.4,vy:0,angle:Math.PI,hitFlash:0,size:88};
  roboFish=[]; tornados=[];
  showAnnounce('🤖 OCEAN BOSS! Charge into it! 🤖',3000);
  bossWrap.style.display='block'; updateHUD();
}

function updBoss1(dt) {
  if(!boss) return;
  boss.x+=boss.vx; boss.y+=boss.vy+Math.sin(frameN*.025)*.9;
  if(boss.x<W*.38){boss.vx=Math.abs(boss.vx)*.8+1;}
  if(boss.x>W*.92){boss.vx=-Math.abs(boss.vx)*.8-1;}
  if(boss.y<80) boss.vy+=0.5; if(boss.y>H-80) boss.vy-=0.5;
  boss.vy*=0.95; boss.angle=boss.vx>0?0:Math.PI;
  if(boss.hitFlash>0) boss.hitFlash-=dt;
  if(bossHitCool>0) bossHitCool-=dt;
  var ps=FISH_STAGES[si].size;
  var bdx=px-boss.x,bdy=py-boss.y,bd=Math.sqrt(bdx*bdx+bdy*bdy);
  if(bd<ps*.65+boss.size*.48&&bossHitCool<=0){
    bossHp--; bossHitCool=1.1; boss.hitFlash=0.35;
    if(oneShotPower){ bossHp=0; oneShotPower=false; }
    var bdir=Math.atan2(boss.y-py,boss.x-px);
    boss.vx=Math.cos(bdir)*5.5; boss.vy=Math.sin(bdir)*3;
    pvx=Math.cos(bdir+Math.PI)*7; pvy=Math.sin(bdir+Math.PI)*7;
    if(bossHp<=0){
      boss=null;
      lives=Math.min(MAX_LIVES,lives+2);
      showAnnounce('🎉 BOSS BEATEN!\n🦑 You became a SQUID!! +2❤️',4200);
      setTimeout(startSquidPhase,4800);
      return;
    }
    if(!bossPhase2&&bossHp<=Math.ceil(BOSS1_MAX/2)){
      bossPhase2=true; showAnnounce('🌪️ Tornado warning!! 🌪️',2200);
    }
    updateHUD();
  }
  bossAtkTimer-=dt;
  if(bossAtkTimer<=0){
    spawnRobos(boss.x,boss.y,boss.size);
    if(bossPhase2) spawnTornado();
    bossAtkTimer=bossPhase2?2.2:3.5;
  }
}

function spawnRobos(bx,by,bsz) {
  for(var i=0;i<2;i++){
    var ang=Math.atan2(py-by,px-bx)+(Math.random()-.5)*1.0;
    roboFish.push({x:bx+Math.cos(ang)*(bsz+15),y:by+Math.sin(ang)*(bsz+15),vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,size:17,wobble:0,alive:true,stunned:0});
  }
}

function spawnTornado() {
  var side=Math.random()<.5;
  tornados.push({x:side?W*.08:W*.92,y:Math.random()*H,vx:(side?1.8:-1.8)*(.8+Math.random()*.6),vy:(Math.random()-.5)*2,r:52+Math.random()*28,spin:0,alive:true,life:6+Math.random()*4});
}

function updRobo(dt) {
  var ps=isSquid?SQUID.size:FISH_STAGES[si].size;
  var hasDecoy=fakeRobotDecoy&&fakeRobotDecoy.alive;
  for(var ri=0;ri<roboFish.length;ri++){
    var rf=roboFish[ri]; if(!rf.alive) continue;
    if(rf.stunned>0){rf.stunned-=dt;continue;}
    rf.wobble+=dt*4;
    var tx=hasDecoy?fakeRobotDecoy.x:px, ty=hasDecoy?fakeRobotDecoy.y:py;
    var rdx=tx-rf.x,rdy=ty-rf.y,rd=Math.sqrt(rdx*rdx+rdy*rdy);
    if(rd>5){rf.vx+=(rdx/rd)*.14;rf.vy+=(rdy/rd)*.14;}
    var rv=Math.sqrt(rf.vx*rf.vx+rf.vy*rf.vy);
    if(rv>4.5){rf.vx=rf.vx/rv*4.5;rf.vy=rf.vy/rv*4.5;}
    rf.x+=rf.vx;rf.y+=rf.vy;
    if(rf.x<-100||rf.x>W+100||rf.y<-100||rf.y>H+100){rf.alive=false;continue;}
    if(hasDecoy){
      if(rd<fakeRobotDecoy.size+rf.size) rf.alive=false;
    } else {
      if(rd<ps*.7+rf.size){rf.alive=false;hurtPlayer(rf.x,rf.y);}
    }
  }
}

function updTornadoes(dt) {
  for(var ti=0;ti<tornados.length;ti++){
    var t=tornados[ti]; if(!t.alive) continue;
    t.spin+=dt*3.5; t.life-=dt;
    if(t.life<=0){t.alive=false;continue;}
    t.x+=t.vx;t.y+=t.vy;
    if(t.x<0||t.x>W) t.vx*=-1; if(t.y<0||t.y>H) t.vy*=-1;
    var tdx=px-t.x,tdy=py-t.y,td=Math.sqrt(tdx*tdx+tdy*tdy);
    if(td<t.r*.65) hurtPlayer(t.x,t.y);
  }
}

// ── Squid Phase ───────────────────────────────────────────────────────────
function startSquidPhase() {
  phase='squid'; isSquid=true; squidEvo=0;
  foods=[]; enemies=[]; inkCooldown=0; inkClouds=[];
  bossWrap.style.display='none'; inkBtn.style.display='flex';

  showAnnounce('🦑 You are a SQUID!\nTap INK to stun enemies! 💜',3500);
  try { var _sd={checkpoint:'squid',si:si,isSquid:true,isOctopus:false,score:score,lives:lives,coins:coins,savedAt:Date.now()}; localStorage.setItem(SAVE_KEY,JSON.stringify(_sd)); } catch(e) {}
  updateHUD();
}

// ── Boss 2: Kraken ────────────────────────────────────────────────────────
function startKraken() {
  if(phase==='boss2') return;
  phase='boss2'; krakenPhase2=false;
  kraken={x:W*.72,y:H/2,vx:-0.5,vy:0,hp:BOSS2_MAX,hitCool:0,hitFlash:0,size:70,atkTimer:3.5,arms:[]};
  for(var i=0;i<6;i++){
    kraken.arms.push({
      angle:(i/6)*Math.PI*2, ext:0, mode:'rest',
      timer:0.8+i*0.5, length:125+Math.random()*35, curlDir:(i%2===0)?1:-1
    });
  }
  kFishPiles=[]; roboFish=[]; foods=[]; enemies=[];
  showAnnounce('🐙 THE KRAKEN!\nDodge the arms, charge its body! 🦑',3500);
  updateHUD();
}

function updKraken(dt) {
  if(!kraken) return;
  kraken.x+=kraken.vx+Math.sin(frameN*.018)*.5;
  kraken.y+=kraken.vy+Math.cos(frameN*.022)*.7;
  if(kraken.x<W*.28){kraken.vx=Math.abs(kraken.vx)*.5+0.4;}
  if(kraken.x>W*.88){kraken.vx=-(Math.abs(kraken.vx)*.5+0.4);}
  if(kraken.y<90) kraken.vy+=0.3; if(kraken.y>H-90) kraken.vy-=0.3;
  kraken.vy*=0.98;
  if(kraken.hitFlash>0) kraken.hitFlash-=dt;
  if(kraken.hitCool>0) kraken.hitCool-=dt;
  if(krakenFreezeTimer>0){ krakenFreezeTimer-=dt; updateHUD(); return; }

  for(var ai=0;ai<kraken.arms.length;ai++){
    var arm=kraken.arms[ai];
    arm.timer-=dt;
    if(arm.mode==='rest'&&arm.timer<=0){
      arm.mode='strike';
      arm.angle=Math.atan2(py-kraken.y,px-kraken.x)+(Math.random()-.5)*0.5;
      arm.timer=1.6;
    } else if(arm.mode==='strike'){
      arm.ext+=(1-arm.ext)*0.055;
      if(arm.timer<=0){arm.mode='retract';arm.timer=0.8;}
      var tipX=kraken.x+Math.cos(arm.angle)*arm.length*arm.ext;
      var tipY=kraken.y+Math.sin(arm.angle)*arm.length*arm.ext;
      var adx=px-tipX,ady=py-tipY,ad=Math.sqrt(adx*adx+ady*ady);
      if(ad<SQUID.size*.65+18) hurtPlayer(tipX,tipY);
    } else if(arm.mode==='retract'){
      arm.ext+=(0-arm.ext)*0.12;
      if(arm.timer<=0||arm.ext<0.05){
        arm.ext=0; arm.mode='rest';
        arm.timer=2.2+(krakenPhase2?0:1.0)+Math.random()*1.5;
        arm.angle=(arm.angle+1.1)%(Math.PI*2);
      }
    }
  }

  kraken.atkTimer-=dt;
  if(kraken.atkTimer<=0){ spawnFishPile(); kraken.atkTimer=krakenPhase2?2.8:4.5; }

  var kdx=px-kraken.x,kdy=py-kraken.y,kd=Math.sqrt(kdx*kdx+kdy*kdy);
  if(kd<SQUID.size*.65+kraken.size*.5&&kraken.hitCool<=0){
    kraken.hp--; kraken.hitCool=1.2; kraken.hitFlash=0.4; krakenFreezeTimer=5;
    if(oneShotPower){ kraken.hp=0; oneShotPower=false; }
    var kdir=Math.atan2(kraken.y-py,kraken.x-px);
    kraken.vx=Math.cos(kdir)*4; kraken.vy=Math.sin(kdir)*2.5;
    pvx=Math.cos(kdir+Math.PI)*8; pvy=Math.sin(kdir+Math.PI)*8;
    if(kraken.hp<=0){ showChoiceScreen(); return; }
    if(!krakenPhase2&&kraken.hp<=Math.ceil(BOSS2_MAX/2)){
      krakenPhase2=true;
      showAnnounce('🐙 KRAKEN ENRAGED!! 🐙',2000);
      kraken.arms.push({angle:Math.random()*Math.PI*2,ext:0,mode:'rest',timer:0.5,length:130,curlDir:1});
      kraken.arms.push({angle:Math.random()*Math.PI*2,ext:0,mode:'rest',timer:0.8,length:120,curlDir:-1});
    }
    updateHUD();
  }
}

function spawnFishPile() {
  if(!kraken) return;
  var ftx=(fakeRobotDecoy&&fakeRobotDecoy.alive)?fakeRobotDecoy.x:px;
  var fty=(fakeRobotDecoy&&fakeRobotDecoy.alive)?fakeRobotDecoy.y:py;
  var ang=Math.atan2(fty-kraken.y,ftx-kraken.x);
  var spd=3.5+(krakenPhase2?1.2:0);
  kFishPiles.push({x:kraken.x,y:kraken.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:34,alive:true,life:5.5,stunned:0,spin:0});
}

function updKFishPiles(dt) {
  for(var pi=0;pi<kFishPiles.length;pi++){
    var p=kFishPiles[pi]; if(!p.alive) continue;
    if(p.stunned>0){p.stunned-=dt;p.vx*=0.93;p.vy*=0.93;continue;}
    p.life-=dt; p.spin+=dt*3.5;
    if(p.life<=0){p.alive=false;continue;}
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<-90||p.x>W+90||p.y<-90||p.y>H+90){p.alive=false;continue;}
    if(fakeRobotDecoy&&fakeRobotDecoy.alive){
      var fddx=p.x-fakeRobotDecoy.x,fddy=p.y-fakeRobotDecoy.y;
      if(Math.sqrt(fddx*fddx+fddy*fddy)<fakeRobotDecoy.size+p.r*.65){p.alive=false;continue;}
    }
    var pdx=px-p.x,pdy=py-p.y,pd=Math.sqrt(pdx*pdx+pdy*pdy);
    if(pd<SQUID.size*.7+p.r*.65) hurtPlayer(p.x,p.y);
  }
}

function showChoiceScreen() {
  phase='choice'; kraken=null;
  bossWrap.style.display='none'; inkBtn.style.display='none';
  showAnnounce('🏆 KRAKEN DEFEATED!! 🏆',3500);
  try { var _sd={checkpoint:'squid',si:si,isSquid:true,isOctopus:false,score:score,lives:lives,coins:coins,savedAt:Date.now()}; localStorage.setItem(SAVE_KEY,JSON.stringify(_sd)); } catch(e) {}

}

// ── Boss 3: Anglerfish ────────────────────────────────────────────────────
function startBoss3() {
  phase='boss3';
  anglerfish={x:W*.75,y:H/2,vx:-0.6,vy:0,hp:BOSS3_MAX,hitCool:0,hitFlash:0,size:82,atkTimer:3,phase2:false,lureAngle:0,lurePulse:0};
  lightbulbs=[]; inkClouds=[]; cloakActive=false; cloakTimer=0;
  try { var _sd={checkpoint:'octopus',si:si,isSquid:true,isOctopus:isOctopus,score:score,lives:lives,coins:coins,savedAt:Date.now()}; localStorage.setItem(SAVE_KEY,JSON.stringify(_sd)); } catch(e) {}
  bossWrap.style.display='block';
  if (isOctopus) {
    inkBtn.style.display='none';
    showAnnounce('🎣 ANGLERFISH!\nHide with 🐙 CAMOUFLAGE then charge! 👻',3500);
  } else {
    inkBtn.style.display='flex';
    showAnnounce('🎣 ANGLERFISH!\nDodge the lightbulbs! ⚡',3500);
  }
  updateHUD();
}

function updAnglerfish(dt) {
  if(!anglerfish) return;
  var af=anglerfish;
  af.lureAngle+=dt*1.2; af.lurePulse+=dt*4;
  af.x+=af.vx+Math.sin(frameN*.014)*.6;
  af.y+=af.vy+Math.cos(frameN*.019)*.8;
  if(af.x<W*.3){af.vx=Math.abs(af.vx)*.6+0.4;}
  if(af.x>W*.92){af.vx=-(Math.abs(af.vx)*.6+0.4);}
  if(af.y<90) af.vy+=0.25; if(af.y>H-90) af.vy-=0.25;
  af.vy*=0.97;
  if(af.hitFlash>0) af.hitFlash-=dt;
  if(af.hitCool>0) af.hitCool-=dt;
  af.atkTimer-=dt;
  if(af.atkTimer<=0){ shootLightbulbs(); af.atkTimer=af.phase2?2:3; }
  var adx=px-af.x,ady=py-af.y,ad=Math.sqrt(adx*adx+ady*ady);
  if(ad<SQUID.size*.65+af.size*.5&&af.hitCool<=0){
    af.hp--; af.hitCool=1.0; af.hitFlash=0.4;
    if(oneShotPower){ af.hp=0; oneShotPower=false; }
    var adir=Math.atan2(af.y-py,af.x-px);
    af.vx=Math.cos(adir)*3.5; af.vy=Math.sin(adir)*2;
    pvx=Math.cos(adir+Math.PI)*7; pvy=Math.sin(adir+Math.PI)*7;
    if(af.hp<=0){
      anglerfish=null;
      winTitle.textContent='🎣 ANGLERFISH DEFEATED!! 🎣';
      winMsg.textContent='You conquered the deep sea!!\nNothing can stop you!! 🦑🌊';
      winSub.textContent='The ultimate ocean champion!! 🏆';
      bossWrap.style.display='none'; inkBtn.style.display='none'; cloakBtn.style.display='none'; cloakActive=false;
      showAnnounce('🏆 YOU ARE THE CHAMPION!! 🏆',3500);
      setTimeout(function(){ winScreen.classList.add('show'); },4000);
      phase='win'; return;
    }
    if(!af.phase2&&af.hp<=Math.ceil(BOSS3_MAX/2)){
      af.phase2=true; showAnnounce('⚡ ANGLERFISH ENRAGED!! ⚡',2000);
    }
    updateHUD();
  }
}

function shootLightbulbs() {
  if(!anglerfish) return;
  var af=anglerfish;
  var count=af.phase2?10:7;
  for(var i=0;i<count;i++){
    var ang=(i/count)*Math.PI*2;
    var spd=af.phase2?3.8:2.8;
    lightbulbs.push({x:af.x,y:af.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,r:12,alive:true,life:5,glow:0});
  }
  // One aimed at player — only when player is visible
  if (!cloakActive) {
    var aim=Math.atan2(py-af.y,px-af.x);
    lightbulbs.push({x:af.x,y:af.y,vx:Math.cos(aim)*4.5,vy:Math.sin(aim)*4.5,r:12,alive:true,life:5,glow:0});
  }
}

function updLightbulbs(dt) {
  for(var li=0;li<lightbulbs.length;li++){
    var lb=lightbulbs[li]; if(!lb.alive) continue;
    lb.life-=dt; lb.glow+=dt*6;
    if(lb.life<=0){lb.alive=false;continue;}
    lb.x+=lb.vx; lb.y+=lb.vy;
    if(lb.x<-60||lb.x>W+60||lb.y<-60||lb.y>H+60){lb.alive=false;continue;}
    if (!cloakActive) {
      var ldx=px-lb.x,ldy=py-lb.y,ld=Math.sqrt(ldx*ldx+ldy*ldy);
      if(ld<SQUID.size*.7+lb.r){ lb.alive=false; shockPlayer(); }
    }
  }
}

function shockPlayer() {
  if(invTimer>0) return;
  lives-=2; invTimer=2.5; shockTimer=2.0;
  pvx=0; pvy=0;
  updateHUD();
  if(lives<=0){ showAnnounce('💪 So close! Try again! 💪',9999); setTimeout(initGame,3000); }
}

// ── Draw ──────────────────────────────────────────────────────────────────
function draw() {
  if(phase==='land'){
    drawLandBg(); drawCoinPickups(); drawLandFoods(); drawLandEnemies(); drawLandPlayer();
  } else {
    drawBg(); drawCoinPickups();
    if(phase==='play'){ drawFoods(); drawEnemies(); }
    else if(phase==='squid'){ drawFoods(); drawEnemies(); drawInkClouds(); }
    else if(phase==='boss1'){ drawBoss1(); drawRobos(); drawTornadoes(); }
    else if(phase==='boss2'){ drawKraken(); drawKFishPiles(); drawRobos(); drawInkClouds(); }
    else if(phase==='boss3'){ drawAnglerfish(); drawLightbulbs(); drawInkClouds(); }
    if(fakeRobotDecoy&&fakeRobotDecoy.alive) drawFakeRobotDecoy();
    drawPlayer();
  }
}

function drawBg() {
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#001122'); g.addColorStop(1,'#002244');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.globalAlpha=.05; ctx.fillStyle='#40c4ff';
  for(var r=0;r<6;r++){var rx=(r/6)*W+W/12;ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx-90,H);ctx.lineTo(rx+65,H);ctx.closePath();ctx.fill();}
  ctx.restore();
  ctx.fillStyle='rgba(150,220,255,.18)';
  for(var bi=0;bi<bubbles.length;bi++){
    var b=bubbles[bi]; b.y-=b.spd;
    if(b.y<-8){b.y=H+8;b.x=Math.random()*W;}
    ctx.beginPath();ctx.arc(b.x%W,b.y,b.r,0,Math.PI*2);ctx.fill();
  }
  var now=Date.now()/1000;
  ctx.strokeStyle='#1a5c1a'; ctx.lineWidth=5;
  for(var sw=0;sw<7;sw++){
    var sx=(sw/7)*W+22;
    ctx.beginPath();ctx.moveTo(sx,H);
    ctx.bezierCurveTo(sx+Math.sin(now+sw)*18,H-50,sx+Math.sin(now+sw+1)*18,H-100,sx+Math.sin(now+sw+2)*14,H-145);
    ctx.stroke();
  }
}

function drawFoods() {
  for(var fi=0;fi<foods.length;fi++){
    var f=foods[fi]; if(!f.alive) continue;
    if(f.type==='plankton') drawPlankton(f.x,f.y,f.size,f.wobble);
    else{
      var fc={sf:'#ffee58',mf:'#ffa726',lf:'#ef5350',xlf:'#ab47bc'}[f.type]||'#ffee58';
      drawSmallFish(f.x,f.y,f.size,fc,Math.atan2(f.vy||0,f.vx||0.1));
    }
  }
}

function drawEnemies() {
  var ps=isSquid?SQUID.size:FISH_STAGES[si].size;
  for(var ei=0;ei<enemies.length;ei++){
    var e=enemies[ei]; if(!e.alive) continue;
    ctx.save(); if(e.stunned>0) ctx.globalAlpha=0.45;
    if(e.isPred){
      drawRedFish(e.x,e.y,e.size,Math.atan2(py-e.y,px-e.x),e.size>ps*1.5);
    } else {
      drawSmallFish(e.x,e.y,e.size,e.color,Math.atan2(e.vy||0,e.vx||0.1));
    }
    ctx.restore();
  }
}

function drawPlayer() {
  var inv=invTimer>0&&(Math.floor(invTimer*8)%2===0);
  if(inv) return;
  ctx.save();ctx.translate(px,py);ctx.rotate(pAngle);
  if(cloakActive) ctx.globalAlpha=0.22;
  if(isOctopus){ drawSquid(SQUID.size,OCTOPUS_COLOR); }
  else if(isSquid){ drawSquid(SQUID.size,SQUID.color); }
  else if(si===0){ drawFishBody(FISH_STAGES[si].size,FISH_STAGES[si].color,'#1565c0'); }
  else if(si<=2){ drawShark(FISH_STAGES[si].size,FISH_STAGES[si].color); }
  else if(si===3){ drawOrca(FISH_STAGES[si].size); }
  else { drawWhale(FISH_STAGES[si].size,FISH_STAGES[si].color); }
  ctx.restore();
  if(cloakActive){
    ctx.save();
    ctx.globalAlpha=0.22+0.14*Math.sin(Date.now()/150);
    ctx.strokeStyle='#00e5ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(px,py,SQUID.size*1.35,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  if(shockTimer>0){
    var ps2=isSquid?SQUID.size:FISH_STAGES[si].size;
    ctx.save(); ctx.globalAlpha=0.7*(0.5+0.5*Math.sin(Date.now()/60));
    ctx.strokeStyle='#ffee00'; ctx.lineWidth=3;
    for(var zi=0;zi<6;zi++){
      var za=(zi/6)*Math.PI*2+Date.now()/200;
      var zr=ps2+8+Math.random()*12;
      ctx.beginPath();ctx.moveTo(px+Math.cos(za)*ps2,py+Math.sin(za)*ps2);
      ctx.lineTo(px+Math.cos(za)*zr,py+Math.sin(za)*zr);ctx.stroke();
    }
    ctx.restore();
  }
}

function drawAnglerfish() {
  if(!anglerfish) return;
  var af=anglerfish, flash=af.hitFlash>0;
  ctx.save(); ctx.translate(af.x,af.y);
  var glow=ctx.createRadialGradient(0,0,af.size*.4,0,0,af.size*1.6);
  glow.addColorStop(0,'rgba(0,60,20,.3)'); glow.addColorStop(1,'rgba(0,60,20,0)');
  ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(0,0,af.size*1.6,0,Math.PI*2); ctx.fill();
  // Tail
  ctx.fillStyle=flash?'#ccc':'#0d3018';
  ctx.beginPath(); ctx.moveTo(-af.size*.75,0); ctx.lineTo(-af.size*1.22,-af.size*.58); ctx.lineTo(-af.size*1.22,af.size*.58); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#000';ctx.lineWidth=af.size*.08;ctx.lineJoin='round';ctx.stroke();
  // Body
  ctx.fillStyle=flash?'#fff':'#0a2010';
  ctx.beginPath(); ctx.ellipse(0,0,af.size,af.size*.55,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#000';ctx.lineWidth=af.size*.09;ctx.lineJoin='round';ctx.stroke();
  // Dorsal spines
  ctx.fillStyle=flash?'#eee':'#1a4020';
  ctx.beginPath();
  for(var fi2=0;fi2<5;fi2++){var fx=af.size*.2+fi2*af.size*.14;ctx.moveTo(fx,-af.size*.55);ctx.lineTo(fx+af.size*.05,-af.size*.8);ctx.lineTo(fx+af.size*.1,-af.size*.55);}
  ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=af.size*.06;ctx.lineJoin='round';ctx.stroke();
  // Lure rod
  var lx=af.size*.5+Math.cos(af.lureAngle)*af.size*.35;
  var ly=-af.size*.7+Math.sin(af.lureAngle)*af.size*.2;
  ctx.strokeStyle=flash?'#aaa':'#2a6030'; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(af.size*.3,-af.size*.4); ctx.lineTo(lx,ly); ctx.stroke();
  // Lure glow
  var lp=0.6+Math.sin(af.lurePulse)*0.4;
  var lg=ctx.createRadialGradient(lx,ly,0,lx,ly,24);
  lg.addColorStop(0,'rgba(255,255,150,'+lp+')'); lg.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle=lg; ctx.beginPath(); ctx.arc(lx,ly,24,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffe000'; ctx.beginPath(); ctx.arc(lx,ly,9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#000';ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(lx-3,ly-3,3.5,0,Math.PI*2);ctx.fill();
  // Eye (scary big)
  cEye(af.size*.42,-af.size*.1,af.size*.18,'#001500');
  ctx.restore();
}

function drawLightbulbs() {
  for(var li=0;li<lightbulbs.length;li++){
    var lb=lightbulbs[li]; if(!lb.alive) continue;
    var lg2=ctx.createRadialGradient(lb.x,lb.y,0,lb.x,lb.y,lb.r*2);
    var gv=0.5+0.5*Math.sin(lb.glow);
    lg2.addColorStop(0,'rgba(255,255,100,'+gv+')');
    lg2.addColorStop(1,'rgba(255,200,0,0)');
    ctx.fillStyle=lg2; ctx.beginPath(); ctx.arc(lb.x,lb.y,lb.r*2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffee00'; ctx.beginPath(); ctx.arc(lb.x,lb.y,lb.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(lb.x-lb.r*.3,lb.y-lb.r*.3,lb.r*.35,0,Math.PI*2); ctx.fill();
  }
}

// ── Cartoon shapes ────────────────────────────────────────────────────────
function cOutline(lw,col){ctx.strokeStyle=col||'#000';ctx.lineWidth=lw;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();}
function cEye(ex,ey,er,pupilCol){
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,ey,er,0,Math.PI*2);ctx.fill();cOutline(er*.32);
  ctx.fillStyle=pupilCol||'#111';ctx.beginPath();ctx.arc(ex+er*.12,ey,er*.55,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+er*.3,ey-er*.3,er*.22,0,Math.PI*2);ctx.fill();
}

function drawFishBody(sz,col,eyeCol) {
  // Tail
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(-sz*.65,0);ctx.lineTo(-sz*1.22,-sz*.54);ctx.lineTo(-sz*1.22,sz*.54);ctx.closePath();ctx.fill();cOutline(sz*.09);
  // Body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(0,0,sz,sz*.55,0,0,Math.PI*2);ctx.fill();cOutline(sz*.09);
  // Dorsal fin
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(-sz*.05,-sz*.55);ctx.lineTo(sz*.18,-sz*.92);ctx.lineTo(sz*.38,-sz*.55);ctx.closePath();ctx.fill();cOutline(sz*.09);
  // Belly shine
  ctx.fillStyle='rgba(255,255,255,.28)';
  ctx.beginPath();ctx.ellipse(-sz*.08,-sz*.18,sz*.42,sz*.2,-.3,0,Math.PI*2);ctx.fill();
  // Smile
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=sz*.07;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(sz*.28,sz*.1,sz*.18,0.2,1.1);ctx.stroke();
  // Eye
  cEye(sz*.44,-sz*.1,sz*.24,eyeCol||'#1565c0');
}

function drawShark(sz,col) {
  // Tail
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(-sz*.75,0);ctx.lineTo(-sz*1.28,-sz*.56);ctx.lineTo(-sz*1.28,sz*.56);ctx.closePath();ctx.fill();cOutline(sz*.08);
  // Body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(0,0,sz,sz*.4,0,0,Math.PI*2);ctx.fill();cOutline(sz*.08);
  // Dorsal fin
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(sz*.08,-sz*.4);ctx.lineTo(sz*.4,-sz*.96);ctx.lineTo(sz*.64,-sz*.4);ctx.closePath();ctx.fill();cOutline(sz*.08);
  // Belly
  ctx.fillStyle='#dff0f2';
  ctx.beginPath();ctx.ellipse(sz*.04,sz*.12,sz*.66,sz*.22,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=sz*.04;ctx.stroke();
  // Body shine
  ctx.fillStyle='rgba(255,255,255,.22)';
  ctx.beginPath();ctx.ellipse(-sz*.1,-sz*.17,sz*.48,sz*.15,-.2,0,Math.PI*2);ctx.fill();
  // Gill lines
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=sz*.05;ctx.lineCap='round';
  for(var g=0;g<3;g++){ctx.beginPath();ctx.arc(sz*(-.04-g*.18),0,sz*.26,-.48,.48);ctx.stroke();}
  // Eye (menacing — no shine tilt)
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.5,-sz*.07,sz*.19,0,Math.PI*2);ctx.fill();cOutline(sz*.07);
  ctx.fillStyle='#111';ctx.beginPath();ctx.ellipse(sz*.52,-sz*.07,sz*.08,sz*.12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.55,-sz*.12,sz*.04,0,Math.PI*2);ctx.fill();
}

function drawOrca(sz) {
  // Tail
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.moveTo(-sz*.72,0);ctx.lineTo(-sz*1.32,-sz*.56);ctx.lineTo(-sz*1.32,sz*.56);ctx.closePath();ctx.fill();cOutline(sz*.08);
  // Body
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.ellipse(0,0,sz,sz*.43,0,0,Math.PI*2);ctx.fill();cOutline(sz*.08);
  // Dorsal fin
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();ctx.moveTo(sz*.05,-sz*.43);ctx.lineTo(sz*.32,-sz*1.06);ctx.lineTo(sz*.58,-sz*.43);ctx.closePath();ctx.fill();cOutline(sz*.08);
  // White belly patch
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();ctx.ellipse(sz*.18,sz*.1,sz*.46,sz*.24,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=sz*.04;ctx.stroke();
  // White eye patch
  ctx.fillStyle='#f0f0f0';
  ctx.beginPath();ctx.ellipse(-sz*.38,sz*.24,sz*.27,sz*.17,.3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=sz*.04;ctx.stroke();
  // Body shine
  ctx.fillStyle='rgba(255,255,255,.15)';
  ctx.beginPath();ctx.ellipse(-sz*.12,-sz*.18,sz*.44,sz*.16,-.15,0,Math.PI*2);ctx.fill();
  // Smile
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=sz*.07;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(sz*.3,sz*.08,sz*.22,0.3,1.1);ctx.stroke();
  // Eye
  cEye(sz*.5,-sz*.08,sz*.17,'#1a1a2e');
}

function drawWhale(sz,col) {
  // Tail flukes
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(-sz*.78,0);ctx.lineTo(-sz*1.32,-sz*.64);ctx.lineTo(-sz*1.1,0);ctx.lineTo(-sz*1.32,sz*.64);ctx.closePath();ctx.fill();cOutline(sz*.08);
  // Body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(0,0,sz,sz*.38,0,0,Math.PI*2);ctx.fill();cOutline(sz*.08);
  // Pec fin
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(sz*.08,sz*.42,sz*.3,sz*.13,.4,0,Math.PI*2);ctx.fill();cOutline(sz*.07);
  // Belly
  ctx.fillStyle='#5c9eff';
  ctx.beginPath();ctx.ellipse(sz*.08,sz*.14,sz*.62,sz*.2,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=sz*.04;ctx.stroke();
  // Body shine
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.beginPath();ctx.ellipse(-sz*.12,-sz*.15,sz*.5,sz*.16,-.15,0,Math.PI*2);ctx.fill();
  // Smile
  ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=sz*.08;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(sz*.35,sz*.06,sz*.22,0.25,1.1);ctx.stroke();
  // Eye (big friendly)
  cEye(sz*.55,-sz*.07,sz*.18,'#0d3a6b');
}

function drawSquid(sz,col) {
  // Tentacles — black outline first then colored
  ctx.lineCap='round';
  for(var ti=0;ti<8;ti++){
    var ta=((ti/8)-.5)*Math.PI*.85;
    var tw=8-ti*.4;
    var tx=sz*1.3+Math.cos(ta)*sz*.55, ty2=Math.sin(ta)*sz*.62;
    ctx.strokeStyle='#000';ctx.lineWidth=tw+3;
    ctx.beginPath();ctx.moveTo(sz*.4,Math.sin(ta)*sz*.18);
    ctx.quadraticCurveTo(sz*.9+Math.sin(ta)*sz*.22,Math.sin(ta)*sz*.42,tx,ty2);ctx.stroke();
    ctx.strokeStyle=col;ctx.lineWidth=tw;
    ctx.beginPath();ctx.moveTo(sz*.4,Math.sin(ta)*sz*.18);
    ctx.quadraticCurveTo(sz*.9+Math.sin(ta)*sz*.22,Math.sin(ta)*sz*.42,tx,ty2);ctx.stroke();
    // Sucker dots
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.beginPath();ctx.arc(tx,ty2,3.5,0,Math.PI*2);ctx.fill();
  }
  // Mantle
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(-sz*.1,0,sz*.62,sz*.3,0,0,Math.PI*2);ctx.fill();cOutline(sz*.09);
  // Head
  ctx.fillStyle=col;

function updCoins(dt) {
  var ps=isSquid?SQUID.size:FISH_STAGES[si].size;

// ── Land World ────────────────────────────────────────────────────────────
function startLandWorld() {
  phase='land'; isLand=true; si=0; evoPoints=0;
  px=W/2; py=H/2; pvx=pvy=0; pAngle=0;
  foods=[]; enemies=[]; respawnQ=[];
  spawnLandFoods(14); spawnLandEnemies(3);
  updateHUD();
}

function makeLandFood() {
  var pool;
  if(si===0) pool=['cheese','cheese','cheese','cheese'];
  else if(si===1) pool=['cheese','cheese','tmouse','tmouse'];
  else pool=['cheese','tmouse','amouse','amouse'];
  var t=pool[Math.floor(Math.random()*pool.length)];
  var sz={cheese:14,tmouse:18,amouse:28}[t]||14;
  var e=Math.floor(Math.random()*4);
  var x=e===0||e===2?Math.random()*W:(e===1?W+50:-50);
  var y=e===1||e===3?Math.random()*H:(e===0?-50:H+50);
  return{type:t,x:x,y:y,vx:(Math.random()-.5)*1.2,vy:(Math.random()-.5)*1.0,size:sz,wobble:Math.random()*6.28,alive:true};
}

function spawnLandFoods(n){for(var i=0;i<n;i++) foods.push(makeLandFood());}

function canEatLand(type){
  if(type==='cheese') return true;
  if(type==='tmouse') return si>=1;
  if(type==='amouse') return si>=2;
  return false;
}

function landFoodPts(type){return{cheese:2,tmouse:4,amouse:7}[type]||1;}

function makeLandEnemy() {
  var ps=LAND_STAGES[si].size;
  var isPred=Math.random()<0.55;
  var predType;
  if(isPred){
    if(si===0) predType='lizard';
    else if(si===1) predType=Math.random()<0.4?'lion':'lizard';
    else predType=Math.random()<0.33?'snake':(Math.random()<0.5?'lion':'lizard');
  }
  var size=isPred
    ?(predType==='lizard'?ps*(1.25+Math.random()*.3):(predType==='lion'?ps*(1.6+Math.random()*.4):ps*(1.1+Math.random()*.25)))
    :Math.max(8,ps*(.35+Math.random()*.2));
  var e=Math.floor(Math.random()*4);
  var x=e===0||e===2?Math.random()*W:(e===1?W+70:-70);
  var y=e===1||e===3?Math.random()*H:(e===0?-70:H+70);
  var spd=isPred?(predType==='snake'?2.2:(predType==='lion'?1.5:1.2)):1.0;
  return{x:x,y:y,vx:(Math.random()-.5)*spd*2,vy:(Math.random()-.5)*spd*2,size:size,isPred:isPred,predType:predType||null,wobble:Math.random()*6.28,alive:true,stunned:0};
}

function spawnLandEnemies(n){for(var i=0;i<n;i++) enemies.push(makeLandEnemy());}

function updLandFoods(dt) {
  var ps=LAND_STAGES[si].size;
  for(var fi=0;fi<foods.length;fi++){
    var f=foods[fi]; if(!f.alive) continue;
    f.wobble+=dt*2; f.x+=f.vx; f.y+=f.vy;
    if(f.x<-60)f.x=W+50; if(f.x>W+60)f.x=-50;
    if(f.y<-60)f.y=H+50; if(f.y>H+60)f.y=-50;
    var fdx=f.x-px,fdy=f.y-py,fd=Math.sqrt(fdx*fdx+fdy*fdy);
    if(canEatLand(f.type)&&fd<ps*.9+f.size*.6){
      f.alive=false; score+=landFoodPts(f.type); evoPoints+=landFoodPts(f.type);
      respawnQ.push(Date.now()+1400);
      if(evoPoints>=LAND_STAGES[si].needed) evolveLand();
    }
  }
}

function updLandEnemies(dt) {
  var ps=LAND_STAGES[si].size;
  for(var ei=0;ei<enemies.length;ei++){
    var e=enemies[ei]; if(!e.alive) continue;
    if(e.stunned>0){e.stunned-=dt;continue;}
    e.wobble+=dt*2.5;
    var edx=px-e.x,edy=py-e.y,ed=Math.sqrt(edx*edx+edy*edy);
    if(e.isPred){
      var cs=(e.predType==='snake'?2.6:(e.predType==='lion'?2.0:1.6))*dt*60*0.04;
      if(ed>5){e.vx+=(edx/ed)*cs;e.vy+=(edy/ed)*cs;}
      e.vx*=0.88;e.vy*=0.88;e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80)e.x=W+60; if(e.x>W+80)e.x=-60;
      if(e.y<-80)e.y=H+60; if(e.y>H+80)e.y=-60;
      if(ed<ps*.75+e.size*.55) hurtPlayer(e.x,e.y);
    } else {
      e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80)e.x=W+60; if(e.x>W+80)e.x=-60;
      if(e.y<-80)e.y=H+60; if(e.y>H+80)e.y=-60;
      if(ed<ps*.85+e.size*.6){
        e.alive=false; score+=3; evoPoints+=2;
        respawnQ.push(Date.now()+1200);
        if(evoPoints>=LAND_STAGES[si].needed) evolveLand();
      }
    }
  }
}

function evolveLand() {
  si++; evoPoints=0;
  if(si>=LAND_STAGES.length){
    si=LAND_STAGES.length-1; enemies=[];
    showAnnounce('🐀 RAT KING!! You rule the land!! 🎉',3500);
    setTimeout(landVictory,4000);
  } else {
    if(lives<MAX_LIVES) lives++;
    showAnnounce('⭐ EVOLVED to '+LAND_STAGES[si].name+'! +1❤️',2500);
    enemies=[]; spawnLandEnemies(3+si);
    try{var _ld={checkpoint:'land',si:si,isLand:true,score:score,lives:lives,coins:coins,savedAt:Date.now()};localStorage.setItem(SAVE_KEY,JSON.stringify(_ld));}catch(e){}
  }
  updateHUD();
}

function landVictory() {
  phase='win';
  winTitle.textContent='🏆 LAND WORLD CONQUERED!! 🌍';
  winMsg.textContent='You grew from tiny mouse to mighty RAT!\nYou rule the land! 🐀👑';
  winSub.textContent='The greatest land ruler ever! 🌿';
  winScreen.classList.add('show');
}

function drawLandBg() {
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#87ceeb'); g.addColorStop(0.55,'#b2dfdb'); g.addColorStop(1,'#33691e');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#388e3c'; ctx.fillRect(0,H*.55,W,H*.45);
  var gg=ctx.createLinearGradient(0,H*.55,0,H*.65);
  gg.addColorStop(0,'#4caf50'); gg.addColorStop(1,'#2e7d32');
  ctx.fillStyle=gg; ctx.fillRect(0,H*.55,W,H*.1);
  var now2=Date.now()/1000;
  ctx.strokeStyle='#2e7d32'; ctx.lineWidth=3;
  for(var gw=0;gw<20;gw++){
    var gx=(gw/20)*W+14;
    ctx.beginPath(); ctx.moveTo(gx,H*.57);
    ctx.bezierCurveTo(gx+Math.sin(now2+gw)*7,H*.57-22,gx+Math.sin(now2+gw+1)*7,H*.57-38,gx+Math.sin(now2+gw+2)*5,H*.57-50);
    ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,0.8)';
  var ct=Date.now()/14000;
  var cls=[[W*.12+Math.sin(ct)*28,H*.1,58,25],[W*.5+Math.cos(ct*.7)*22,H*.07,75,30],[W*.82+Math.sin(ct*.55)*18,H*.13,52,22]];
  for(var ci=0;ci<cls.length;ci++){
    var cl=cls[ci];
    ctx.beginPath(); ctx.ellipse(cl[0],cl[1],cl[2],cl[3],0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl[0]-cl[2]*.4,cl[1]+cl[3]*.25,cl[2]*.5,cl[3]*.65,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl[0]+cl[2]*.4,cl[1]+cl[3]*.2,cl[2]*.45,cl[3]*.6,0,0,Math.PI*2); ctx.fill();
  }
}

function drawLandFoods() {
  for(var fi=0;fi<foods.length;fi++){
    var f=foods[fi]; if(!f.alive) continue;
    ctx.save(); ctx.translate(f.x,f.y);
    if(f.type==='cheese'){
      var cs=f.size;
      ctx.fillStyle='#fdd835';
      ctx.beginPath(); ctx.moveTo(0,-cs); ctx.lineTo(-cs*.9,cs*.6); ctx.lineTo(cs*.9,cs*.6); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='#f9a825'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#f57f17';
      ctx.beginPath(); ctx.arc(-cs*.2,cs*.12,cs*.22,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cs*.3,cs*.3,cs*.18,0,Math.PI*2); ctx.fill();
    } else if(f.type==='tmouse'||f.type==='amouse'){
      var ms=f.size;
      ctx.fillStyle=f.type==='tmouse'?'#bdbdbd':'#9e9e9e';
      ctx.beginPath(); ctx.ellipse(0,0,ms,ms*.6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ms*.45,-ms*.48,ms*.3,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ms*.72,-ms*.38,ms*.26,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#f48fb1';
      ctx.beginPath(); ctx.arc(ms*.45,-ms*.48,ms*.16,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ms*.72,-ms*.38,ms*.14,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#212121';
      ctx.beginPath(); ctx.arc(ms*.6,ms*.06,ms*.13,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#757575'; ctx.lineWidth=ms*.1;
      ctx.beginPath(); ctx.moveTo(-ms*.7,0); ctx.lineTo(-ms*1.3,ms*.2); ctx.stroke();
    }
    ctx.restore();
  }
}

function drawLandEnemies() {
  for(var ei=0;ei<enemies.length;ei++){
    var e=enemies[ei]; if(!e.alive) continue;
    ctx.save(); if(e.stunned>0) ctx.globalAlpha=0.45;
    ctx.translate(e.x,e.y);
    ctx.rotate(Math.atan2(py-e.y,px-e.x));
    if(!e.isPred){
      ctx.fillStyle='#6d4c41';
      ctx.beginPath(); ctx.ellipse(0,0,e.size,e.size*.45,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#4e342e'; ctx.lineWidth=2; ctx.stroke();
    } else if(e.predType==='lizard'){
      var lz=e.size;
      ctx.fillStyle='#558b2f';
      ctx.beginPath(); ctx.ellipse(0,0,lz,lz*.38,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#33691e';
      ctx.beginPath(); ctx.ellipse(lz*.75,0,lz*.35,lz*.28,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-lz*.7,0); ctx.lineTo(-lz*1.4,lz*.2); ctx.lineTo(-lz*1.4,-lz*.2); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#ff8f00';
      ctx.beginPath(); ctx.arc(lz*.88,-lz*.1,lz*.11,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(lz*.88,lz*.1,lz*.11,0,Math.PI*2); ctx.fill();
    } else if(e.predType==='lion'){
      var lo=e.size;
      ctx.fillStyle='#b25900';
      ctx.beginPath(); ctx.arc(lo*.35,0,lo*.72,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ef8c00';
      ctx.beginPath(); ctx.arc(lo*.35,0,lo*.52,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-lo*.3,0,lo*.55,lo*.38,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#212121';
      ctx.beginPath(); ctx.arc(lo*.55,-lo*.17,lo*.11,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(lo*.55,lo*.17,lo*.11,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#bf360c'; ctx.lineWidth=lo*.12;
      ctx.beginPath(); ctx.moveTo(-lo*.8,0); ctx.lineTo(-lo*1.5,lo*.15); ctx.stroke();
    } else {
      var sn=e.size;
      ctx.strokeStyle='#388e3c'; ctx.lineWidth=sn*.42; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(sn*.9,0);
      ctx.bezierCurveTo(sn*.3,sn*.5,-sn*.3,sn*.3,-sn*.6,0);
      ctx.bezierCurveTo(-sn*.9,-sn*.3,-sn*.8,-sn*.6,-sn*.5,-sn*.5);
      ctx.stroke();
      ctx.fillStyle='#1b5e20';
      ctx.beginPath(); ctx.arc(sn*.9,0,sn*.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#ff1744';
      ctx.beginPath(); ctx.moveTo(sn*1.2,-sn*.08); ctx.lineTo(sn*1.4,-sn*.18); ctx.lineTo(sn*1.4,sn*.18); ctx.lineTo(sn*1.2,sn*.08); ctx.closePath(); ctx.fill();
      ctx.fillStyle='#f5f5f5';
      ctx.beginPath(); ctx.arc(sn*.95,-sn*.1,sn*.1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(sn*.95,sn*.1,sn*.1,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawLandPlayer() {
  var inv=invTimer>0&&(Math.floor(invTimer*8)%2===0);
  if(inv) return;
  var ps=LAND_STAGES[si].size;
  ctx.save(); ctx.translate(px,py); ctx.rotate(pAngle);
  if(si<2){
    ctx.fillStyle=si===0?'#eeeeee':'#bdbdbd';
    ctx.beginPath(); ctx.ellipse(0,0,ps,ps*.6,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#9e9e9e'; ctx.lineWidth=ps*.08; ctx.stroke();
    ctx.fillStyle=si===0?'#eeeeee':'#bdbdbd';
    ctx.beginPath(); ctx.arc(ps*.4,-ps*.5,ps*.3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ps*.68,-ps*.4,ps*.26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f06292';
    ctx.beginPath(); ctx.arc(ps*.4,-ps*.5,ps*.16,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ps*.68,-ps*.4,ps*.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#212121';
    ctx.beginPath(); ctx.arc(ps*.6,ps*.07,ps*.14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.beginPath(); ctx.arc(ps*.55,0,ps*.06,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#9e9e9e'; ctx.lineWidth=ps*.1;
    ctx.beginPath(); ctx.moveTo(-ps*.7,0); ctx.lineTo(-ps*1.35,ps*.28); ctx.stroke();
  } else {
    ctx.fillStyle='#795548';
    ctx.beginPath(); ctx.ellipse(0,0,ps,ps*.55,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#5d4037'; ctx.lineWidth=ps*.08; ctx.stroke();
    ctx.fillStyle='#795548';
    ctx.beginPath(); ctx.arc(ps*.38,-ps*.5,ps*.28,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ps*.65,-ps*.4,ps*.24,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f06292';
    ctx.beginPath(); ctx.arc(ps*.38,-ps*.5,ps*.14,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ps*.65,-ps*.4,ps*.12,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#212121';
    ctx.beginPath(); ctx.arc(ps*.6,ps*.08,ps*.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.beginPath(); ctx.arc(ps*.55,0,ps*.07,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#4e342e'; ctx.lineWidth=ps*.12;
    ctx.beginPath(); ctx.moveTo(-ps*.7,0); ctx.bezierCurveTo(-ps*1.1,ps*.2,-ps*1.35,ps*.5,-ps*1.1,ps*.75); ctx.stroke();
  }
  ctx.restore();
}

// ── Save / Load ──────────────────────────────────────────────────────────
var SAVE_KEY = 'oceanWorldSave_v2';

function saveProgress() {
  var checkpoint = isLand ? 'land' : isOctopus ? 'octopus' : isSquid ? 'squid' : 'fish';
  var data = { checkpoint:checkpoint, si:si, isSquid:isSquid, isOctopus:isOctopus, isLand:isLand, score:score, lives:Math.max(3,lives), coins:coins, savedAt:Date.now() };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
  showAnnounce('💾 Saved! ⭐', 1800);
  if (shopOpen) closeShop();
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function loadSaveData() {
  try { var r=localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; } catch(e) { return null; }
}

function resumeGame() {
  var saved = loadSaveData();
  document.getElementById('continue-screen').style.display='none';
  if (!saved) { initGame(); return; }
  initGame(true);
  score=saved.score||0; lives=Math.max(3,saved.lives||5); coins=saved.coins||0;
  if (saved.checkpoint==='land') {
    isLand=true;
    showAnnounce('💾 Welcome back!\n🐭 Back to Land World!',3500);
    var _rsi=Math.min(saved.si||0,LAND_STAGES.length-1);
    setTimeout(function(){
      phase='land'; si=_rsi; evoPoints=0;
      px=W/2; py=H/2; pvx=pvy=0; pAngle=0;
      foods=[]; enemies=[]; respawnQ=[];
      spawnLandFoods(14); spawnLandEnemies(3+si); updateHUD();
    },4000);
  } else if (saved.checkpoint==='octopus') {
    isSquid=true; isOctopus=true; si=FISH_STAGES.length-1; foods=[]; enemies=[];
    showAnnounce('💾 Welcome back!\n🐙 Back to the Anglerfish fight!',3500);
    setTimeout(startBoss3,4000);
  } else if (saved.checkpoint==='squid') {
    isSquid=true; si=FISH_STAGES.length-1; foods=[]; enemies=[];
    showAnnounce('💾 Welcome back!\n🦑 Back to squid mode!',3500);
    setTimeout(startSquidPhase,4000);
  } else {
    si=Math.min(saved.si||0,FISH_STAGES.length-1);
    enemies=[]; spawnEnemies(3+si); foods=[]; spawnFoods(14+si*2);
    showAnnounce('💾 Welcome back!\n⭐ Back to '+FISH_STAGES[si].name+'!',3000);
  }
  updateHUD();
}

function startFreshGame() {
  clearSave();
  document.getElementById('continue-screen').style.display='none';
  initGame();
}

// ── Shop ──────────────────────────────────────────────────────────────────
function openShop() {
  if(phase==='win'||phase==='choice') return;
  shopOpen=true;
  document.getElementById('shop-coins-el').textContent=coins;
  var os=document.getElementById('sbtn-oneshot');
  os.disabled=(coins<20||oneShotPower);
  os.style.opacity=(coins<20||oneShotPower)?'0.5':'1';
  os.querySelector('span').textContent=oneShotPower?'⚡ ONE-SHOT ACTIVE!':'⚡ One-Shot Boss!';
  var rb=document.getElementById('sbtn-robot');
  rb.disabled=(coins<10||fakeRobotDecoy!==null);
  rb.style.opacity=(coins<10||fakeRobotDecoy!==null)?'0.5':'1';
  rb.querySelector('span').textContent=fakeRobotDecoy?'🤖 Decoy Active!':'🤖 Fake Robot Decoy';
  document.getElementById('shop-screen').classList.add('show');
}

function closeShop() {
  shopOpen=false;
  document.getElementById('shop-screen').classList.remove('show');
}

function buyOneShot() {
  if(coins<20||oneShotPower) return;
  coins-=20; oneShotPower=true; updateHUD(); closeShop();
  showAnnounce('⚡ ONE-SHOT READY!\nCharge a boss to K.O. it instantly! ⚡',3200);
}

function buyFakeRobot() {
  if(coins<10||fakeRobotDecoy!==null) return;
  coins-=10;
  fakeRobotDecoy={x:px-80,y:py,vx:-1,vy:0,size:22,alive:true};
  updateHUD(); closeShop();
  showAnnounce('🤖 Fake Robot Deployed!\nEnemies chase it, not you! 🤖',3000);
}

// ── Loop ──────────────────────────────────────────────────────────────────
function loop(ts) {
  var dt=Math.min((ts-lastTs)/1000,0.05); lastTs=ts;
  if(phase!=='win'&&phase!=='choice'&&!shopOpen) update(dt);
  draw();
  requestAnimationFrame(loop);
}

var _initSave = loadSaveData();
if (_initSave) {
  var _cs = document.getElementById('continue-screen');
  var _stageLabel = _initSave.isLand ? LAND_STAGES[Math.min(_initSave.si||0,LAND_STAGES.length-1)].name : (_initSave.isOctopus ? '🐙 Octopus vs Anglerfish' : _initSave.isSquid ? '🦑 Squid vs Kraken' : FISH_STAGES[Math.min(_initSave.si||0,FISH_STAGES.length-1)].name);
  document.getElementById('save-info-stage').textContent = '📍 ' + _stageLabel;
  document.getElementById('save-info-score').textContent = '⭐ Score: ' + (_initSave.score||0);
  document.getElementById('save-info-coins').textContent = '🟡 Coins: ' + (_initSave.coins||0);
  _cs.style.display = 'flex';
  initGame(true);
} else {
  initGame();
}
requestAnimationFrame(function(ts){ lastTs=ts; requestAnimationFrame(loop); });
</script>

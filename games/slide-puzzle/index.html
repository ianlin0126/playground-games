<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Slide Puzzle!</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #1a0a2e;
  font-family: 'Chalkboard SE', 'Comic Sans MS', 'Marker Felt', cursive;
  -webkit-user-select: none;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: max(12px, env(safe-area-inset-top, 12px));
  padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
}
#title {
  font-size: 32px;
  color: #FFE566;
  text-shadow: 0 0 16px rgba(255,229,102,.7);
  margin-bottom: 8px;
  flex-shrink: 0;
}
#moves-row {
  font-size: 24px;
  color: #ccc;
  margin-bottom: 10px;
  flex-shrink: 0;
}
#moves-row span { color: #fff; font-weight: bold; }
#board-wrap {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#board {
  position: relative;
  padding: 8px;
  background: rgba(255,255,255,0.07);
  border-radius: 18px;
  border: 2px solid rgba(255,255,255,0.15);
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  font-size: 28px;
  font-weight: 900;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
  transition: left 0.15s ease, top 0.15s ease, transform 0.08s ease, box-shadow 0.08s ease;
  border: none;
  color: #1a0a2e;
  box-shadow: 0 4px 0 rgba(0,0,0,0.35);
  user-select: none;
}
.tile:active { transform: scale(0.93); box-shadow: 0 2px 0 rgba(0,0,0,0.35); }
.tile.empty {
  background: rgba(255,255,255,0.06) !important;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.4);
  cursor: default;
}
#shuffle-btn {
  font-family: inherit;
  font-size: 26px;
  background: #FFD700;
  color: #1a0a2e;
  border: none;
  border-radius: 999px;
  padding: 12px 36px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(255,215,0,.4);
  margin-top: 14px;
  min-height: 56px;
  min-width: 180px;
  flex-shrink: 0;
}
#shuffle-btn:active { transform: scale(0.96); }
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(10,0,30,0.92);
  z-index: 50;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
  padding: 32px;
}
#overlay.show { display: flex; }
#overlay h1 { font-size: 48px; color: #FFE566; text-shadow: 0 0 20px rgba(255,229,102,.8); }
#overlay .moves-done { font-size: 36px; color: #3FFFA0; font-weight: 900; }
#overlay p { font-size: 26px; color: #ccc; }
#overlay button {
  font-family: inherit;
  font-size: 28px;
  background: #FFD700;
  color: #1a0a2e;
  border: none;
  border-radius: 999px;
  padding: 14px 44px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(255,215,0,.5);
  min-width: 200px;
  min-height: 64px;
}
</style>
</head>
<body>
<div id="title">🧩 Slide Puzzle!</div>
<!-- v3 -->
<div id="moves-row">Moves: <span id="moves-el">0</span></div>
<div id="board-wrap">
  <div id="board"></div>
</div>
<button id="shuffle-btn">🔀 New Puzzle</button>

<div id="overlay">
  <h1>🎉 You did it!</h1>
  <div class="moves-done" id="final-moves-el">0 moves</div>
  <p>Amazing solving! 🌟</p>
  <button id="play-again-btn">🔀 New Puzzle</button>
</div>

<script>
(function () {
  'use strict';

  var SIZE = 4;
  var TOTAL = SIZE * SIZE;

  function tileColor(val) {
    /* val 1..15: hue sweeps red→yellow→green→blue→purple */
    var hue = Math.round((val - 1) / 14 * 270);
    return 'hsl(' + hue + ', 85%, 62%)';
  }

  var GAP = 6, PAD = 8;
  var tiles = [];    /* positions 0..15, value=tile number 1..15, 0=empty */
  var moves = 0;
  var won = false;
  var tileEls = {};  /* val 1..15 -> DOM element */

  var boardEl      = document.getElementById('board');
  var movesEl      = document.getElementById('moves-el');
  var overlay      = document.getElementById('overlay');
  var finalMovEl   = document.getElementById('final-moves-el');
  var shuffleBtn   = document.getElementById('shuffle-btn');
  var playAgainBtn = document.getElementById('play-again-btn');

  function tileSize() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var available = Math.min(vw - 24, vh - 200);
    return Math.max(60, Math.floor((available - GAP * (SIZE - 1) - PAD * 2) / SIZE));
  }

  function boardPx(ts) { return SIZE * ts + (SIZE - 1) * GAP + 2 * PAD; }
  function tileLeft(c, ts) { return PAD + c * (ts + GAP); }
  function tileTop(r, ts)  { return PAD + r * (ts + GAP); }

  /* ── Shuffle: 200 random valid moves from solved state ── */
  function shuffle() {
    tiles = [];
    for (var i = 1; i < TOTAL; i++) tiles.push(i);
    tiles.push(0);
    var emptyIdx = TOTAL - 1, prev = -1;
    for (var s = 0; s < 200; s++) {
      var neighbors = getNeighbors(emptyIdx);
      var filtered = neighbors.filter(function(n) { return n !== prev; });
      if (filtered.length === 0) filtered = neighbors;
      var pick = filtered[Math.floor(Math.random() * filtered.length)];
      tiles[emptyIdx] = tiles[pick];
      tiles[pick] = 0;
      prev = emptyIdx;
      emptyIdx = pick;
    }
    moves = 0;
    won = false;
  }

  function getNeighbors(idx) {
    var r = Math.floor(idx / SIZE), c = idx % SIZE, ns = [];
    if (r > 0)      ns.push(idx - SIZE);
    if (r < SIZE-1) ns.push(idx + SIZE);
    if (c > 0)      ns.push(idx - 1);
    if (c < SIZE-1) ns.push(idx + 1);
    return ns;
  }

  function isSolved() {
    for (var i = 0; i < TOTAL - 1; i++) { if (tiles[i] !== i + 1) return false; }
    return tiles[TOTAL-1] === 0;
  }

  /* ── Position tiles (animate=true uses CSS transition, false snaps) ── */
  function positionTiles(animate) {
    var ts = tileSize();
    if (!animate) {
      for (var v in tileEls) tileEls[v].style.transition = 'none';
    }
    for (var i = 0; i < TOTAL; i++) {
      var val = tiles[i];
      if (val === 0) continue;
      var r = Math.floor(i / SIZE), c = i % SIZE;
      tileEls[val].style.left = tileLeft(c, ts) + 'px';
      tileEls[val].style.top  = tileTop(r, ts) + 'px';
    }
    if (!animate) {
      /* re-enable transitions after the snap paint */
      var els = tileEls;
      setTimeout(function() {
        for (var v in els) els[v].style.transition = '';
      }, 30);
    }
    movesEl.textContent = moves;
  }

  /* ── Create persistent tile elements (once per game) ── */
  function createBoard() {
    boardEl.innerHTML = '';
    tileEls = {};
    var ts = tileSize();
    var bs = boardPx(ts);
    boardEl.style.width  = bs + 'px';
    boardEl.style.height = bs + 'px';

    for (var v = 1; v <= TOTAL - 1; v++) {
      var el = document.createElement('div');
      el.className = 'tile';
      el.style.width  = ts + 'px';
      el.style.height = ts + 'px';
      el.style.fontSize = Math.round(ts * 0.42) + 'px';
      el.style.background = tileColor(v);
      el.textContent = v;
      tileEls[v] = el;
      boardEl.appendChild(el);
      attachHandlers(el, v);
    }
    positionTiles(false);
  }

  function attachHandlers(el, val) {
    var startX = null, startY = null;
    el.addEventListener('touchstart', function(e) {
      e.preventDefault();
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, { passive: false });
    el.addEventListener('touchend', function(e) {
      e.preventDefault();
      var dx = e.changedTouches[0].clientX - (startX || 0);
      var dy = e.changedTouches[0].clientY - (startY || 0);
      startX = null;
      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) {
        tryMove(val);
      } else {
        trySwipe(val, dx, dy);
      }
    }, { passive: false });
    el.addEventListener('click', function() { tryMove(val); });
  }

  function applyTileSize() {
    var ts = tileSize();
    var bs = boardPx(ts);
    boardEl.style.width  = bs + 'px';
    boardEl.style.height = bs + 'px';
    for (var v in tileEls) {
      tileEls[v].style.width  = ts + 'px';
      tileEls[v].style.height = ts + 'px';
      tileEls[v].style.fontSize = Math.round(ts * 0.42) + 'px';
    }
    positionTiles(false);
  }

  function doSlide(val) {
    var idx     = tiles.indexOf(val);
    var emptyIdx = tiles.indexOf(0);
    var emptyR = Math.floor(emptyIdx / SIZE), emptyC = emptyIdx % SIZE;
    var r = Math.floor(idx / SIZE), c = idx % SIZE;
    if (idx === emptyIdx || (r !== emptyR && c !== emptyC)) return false;

    if (r === emptyR) {
      if (c < emptyC) {
        for (var ci = emptyC; ci > c; ci--) tiles[r * SIZE + ci] = tiles[r * SIZE + ci - 1];
      } else {
        for (var ci2 = emptyC; ci2 < c; ci2++) tiles[r * SIZE + ci2] = tiles[r * SIZE + ci2 + 1];
      }
    } else {
      if (r < emptyR) {
        for (var ri = emptyR; ri > r; ri--) tiles[ri * SIZE + c] = tiles[(ri - 1) * SIZE + c];
      } else {
        for (var ri2 = emptyR; ri2 < r; ri2++) tiles[ri2 * SIZE + c] = tiles[(ri2 + 1) * SIZE + c];
      }
    }
    tiles[idx] = 0;
    return true;
  }

  function tryMove(val) {
    if (won) return;
    if (!doSlide(val)) return;
    moves++;
    positionTiles(true);
    if (isSolved()) {
      won = true;
      finalMovEl.textContent = moves + (moves === 1 ? ' move' : ' moves');
      setTimeout(function() { overlay.classList.add('show'); }, 350);
    }
  }

  function trySwipe(val, dx, dy) {
    var idx      = tiles.indexOf(val);
    var emptyIdx = tiles.indexOf(0);
    var emptyR = Math.floor(emptyIdx / SIZE), emptyC = emptyIdx % SIZE;
    var r = Math.floor(idx / SIZE), c = idx % SIZE;
    if (Math.abs(dx) >= Math.abs(dy)) {
      if (r !== emptyR) return;
      if (dx > 0 && emptyC <= c) return;
      if (dx < 0 && emptyC >= c) return;
    } else {
      if (c !== emptyC) return;
      if (dy > 0 && emptyR <= r) return;
      if (dy < 0 && emptyR >= r) return;
    }
    tryMove(val);
  }

  function startGame() {
    overlay.classList.remove('show');
    shuffle();
    createBoard();
  }

  shuffleBtn.addEventListener('click', startGame);
  playAgainBtn.addEventListener('click', startGame);

  window.addEventListener('resize', applyTileSize);

  startGame();
}());
</script>
</body>
</html>
